<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的影院 - 在线影视</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg-primary: #0a0e12; --bg-secondary: #1a1e24; --card-bg: #14181f; --text-primary: #ffffff; --text-secondary: #cceeff; --accent-color: #ff5722; --border-color: #2a2e35; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }

        body { background: var(--bg-primary); color: var(--text-primary); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; z-index: 0; }
        .app-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100000000; background: var(--bg-primary); overflow-y: auto; padding: 0 20px 40px 20px; display: flex; flex-direction: column; }
        .content-wrapper { max-width: 1600px; width: 100%; margin: 0 auto; flex: 1; }
        .header-sticky { position: sticky; top: 0; background: rgba(10,14,18,0.92); backdrop-filter: blur(12px); z-index: 100; padding: 16px 0 12px 0; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .title-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        
        .site-title {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            line-height: 1;
            flex-shrink: 0;
        }
        .logo-img {
            height: 36px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            vertical-align: middle;
            display: block;
        }
        
        .title-right-buttons { display: flex; gap: 12px; flex-shrink: 0; }
        .title-right-buttons .nav-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
        .nav-scroll { overflow-x: auto; overflow-y: hidden; white-space: nowrap; display: flex; gap: 8px; padding-bottom: 6px; justify-content: flex-end; }
        .nav-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; pointer-events: auto; z-index: 20; transition: all 0.2s; }
        .nav-btn i { font-size: 16px; }
        .nav-btn:active, .movie-card:active, .episode-btn:active, .page-circle:active, .page-nav:active, .back-btn:active { transform: none; background: inherit; opacity: 0.8; }
        .nav-btn.active { background: var(--accent-color); color: white; box-shadow: 0 2px 8px rgba(255,87,34,0.4); }
        .nav-btn:disabled { opacity: 0.5; pointer-events: none; }
        .search-icon-btn { background: var(--bg-secondary); color: var(--text-secondary); }
        
        /* 筛选按钮固定宽度 */
        #filterBtn {
            min-width: 76px;
            justify-content: center;
        }
        
        /* 搜索框默认折叠 */
        .search-slide {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }
        .search-slide.open {
            max-height: 80px;
            margin-top: 8px;
        }
        
        /* 筛选面板：完全无预留空间，平滑推出 */
        .filter-slide {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.2s ease, margin 0.2s ease;
            margin-top: 0;
            background: var(--bg-secondary);
            border-radius: 20px;
            position: relative;
            z-index: 10;
        }
        /* 用于测量时禁用过渡 */
        .filter-slide--measuring {
            transition: none !important;
        }
        .filter-slide.open {
            max-height: 300px;
            opacity: 1;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .filter-slide-inner {
            padding: 0 12px;
        }
        .filter-slide.open .filter-slide-inner {
            padding: 12px;
        }
        
        .filter-section { margin-bottom: 12px; position: relative; display: flex; align-items: center; }
        .filter-title { font-size: 13px; color: #aaa; margin-right: 4px; white-space: nowrap; letter-spacing: 1px; min-width: 40px; }
        .filter-buttons-wrapper { position: relative; flex: 1; display: flex; align-items: center; overflow: hidden; }
        .filter-buttons { display: flex; flex-wrap: nowrap; gap: 8px; overflow-x: auto; padding: 0 4px; scroll-behavior: smooth; align-items: flex-start; }
        .filter-btn-wrapper { display: inline-flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .filter-btn { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 30px; padding: 6px 14px; font-size: 13px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .filter-count { font-size: 10px; color: #aaa; margin-top: 2px; }
        .search-box { background: var(--bg-secondary); border-radius: 48px; padding: 4px 16px; display: flex; align-items: center; border: 1px solid var(--border-color); }
        .search-box input { flex: 1; background: transparent; border: none; padding: 8px 0; color: white; font-size: 15px; outline: none; }
        .search-box input::placeholder { color: #8e9aaf; }
        .search-box button { background: var(--accent-color); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .movies-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); margin-top: 12px; margin-bottom: 40px; }
        .movie-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; transition: box-shadow 0.2s; cursor: pointer; position: relative; box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .poster { position: relative; aspect-ratio: 2 / 3; background: #0f1117; overflow: hidden; }
        .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .rating { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #ffc107; border-left: 2px solid var(--accent-color); z-index: 2; }
        .rating i { font-size: 10px; margin-right: 3px; color: #ffb347; }
        .type-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; z-index: 2; display: none; }
        .type-badge.movie { background: rgba(255,87,34,0.95); }
        .type-badge.series { background: rgba(33,150,243,0.95); }
        #searchResultView .type-badge, #listView.history-active .type-badge { display: inline-block; }
        .year-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; color: #ffc107; z-index: 2; }
        .series-note { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #ffdbca; font-family: monospace; z-index: 2; }
        .movie-info { padding: 12px 10px; }
        .movie-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f0f0f0; }
        .play-progress { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; color: #ffdbca; font-family: monospace; z-index: 2; display: flex; flex-direction: column; gap: 2px; }
        .pagination-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .page-circles { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 4px; max-width: 100%; justify-content: center; flex-wrap: nowrap; }
        .page-circle { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); border-radius: 50%; font-weight: 600; font-size: 16px; cursor: pointer; flex-shrink: 0; border: 1px solid var(--border-color); color: var(--text-secondary); }
        .page-circle.active-page { background: var(--accent-color); color: white; box-shadow: 0 0 10px var(--accent-color); border-color: var(--accent-color); }
        .page-nav-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .page-nav { background: var(--bg-secondary); border: none; padding: 8px 24px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; font-size: 14px; }
        .page-nav.disabled { opacity: 0.4; pointer-events: none; }
        .page-indicator { font-size: 15px; color: var(--text-secondary); background: var(--bg-secondary); padding: 4px 12px; border-radius: 30px; }
        .empty-msg { text-align: center; padding: 60px; color: #aaa; font-size: 18px; }
        .history-toolbar { position: sticky; top: 72px; z-index: 99; display: flex; justify-content: flex-end; margin: 0 0 16px 0; padding: 6px 12px; background: rgba(10,14,18,0.96); backdrop-filter: blur(12px); border-radius: 48px; width: fit-content; margin-left: auto; gap: 12px; border: 1px solid var(--border-color); }
        .history-filter-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 13px; padding: 4px 14px; border-radius: 30px; cursor: pointer; }
        .history-filter-btn.active { background: var(--accent-color); color: white; }
        .clear-history-btn { background: rgba(30,30,40,0.9); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 13px; padding: 4px 14px; border-radius: 30px; cursor: pointer; }
        .longpress-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 12px; background: transparent; z-index: 1000; }
        .longpress-menu button { background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px 24px; font-size: 15px; font-weight: 600; cursor: pointer; min-width: 100px; }
        .longpress-menu button.delete-btn { background: #d32f2f; color: white; border-color: #ff6659; }
        .longpress-menu button.cancel-btn { background: #2c2e3a; color: #eee; border-color: #4a4e5a; }
        .scroll-tip-container { width: 100%; overflow: hidden; margin: 8px 0 0 0; background: rgba(255,87,34,0.15); border-radius: 30px; backdrop-filter: blur(4px); }
        .scroll-tip-text { display: inline-block; white-space: nowrap; padding: 6px 0; font-size: 13px; color: #ffaa88; animation: breatheTip 1s ease-in-out infinite, scrollTip 12s linear 2; }
        @keyframes breatheTip { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes scrollTip { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .episode-selector { display: none; animation: fadeIn 0.2s ease; }
        .episode-selector.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .selector-header { position: relative; display: flex; gap: 20px; margin-bottom: 20px; background: var(--bg-secondary); border-radius: 20px; padding: 16px; align-items: flex-end; }
        .selector-poster { width: 120px; flex-shrink: 0; }
        .selector-poster img { width: 100%; border-radius: 12px; aspect-ratio: 2/3; object-fit: cover; }
        .selector-title { font-size: 22px; font-weight: bold; color: #fff; }
        .back-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .stamp { position: absolute; left: 140px; top: 70px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid #ff5722; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #ff5722; transform: rotate(-5deg); pointer-events: none; }
        .episode-header { margin: 15px 0 12px 0; padding-left: 8px; font-size: 16px; font-weight: 600; color: var(--accent-color); border-left: 3px solid var(--accent-color); }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, auto)); gap: 12px; max-height: 60vh; overflow-y: auto; padding: 8px 4px; }
        .episode-btn { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 0; text-align: center; cursor: pointer; font-size: 16px; color: var(--text-secondary); }
        .episode-btn.highlight { background: var(--accent-color); color: white; animation: strong-breathe 1s infinite; }
        @keyframes strong-breathe { 0% { box-shadow: 0 0 0 0 rgba(255,87,34,0.8); } 50% { box-shadow: 0 0 0 10px rgba(255,87,34,0); background: #ff6a3a; } 100% { box-shadow: 0 0 0 0 rgba(255,87,34,0); } }
        
        @media (max-width: 640px) { 
            .logo-img {
                height: 46px;
                max-width: 120px;
            }
            .selector-poster { width: 90px; } 
            .selector-title { font-size: 18px; } 
            .back-btn { padding: 6px 12px; font-size: 13px; top: 12px; right: 12px; } 
            .stamp { left: 110px; width: 50px; height: 50px; font-size: 12px; top: 55px; } 
            .history-toolbar { top: 65px; gap: 6px; padding: 4px 10px; } 
            .movies-grid { gap: 14px; } 
            .nav-btn { padding: 6px 12px; font-size: 13px; }
            #filterBtn {
                min-width: 68px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="content-wrapper">
        <div class="header-sticky">
            <div class="title-bar">
                <div class="site-title">
                    <img src="img/logo.png" alt="我的影院" class="logo-img">
                </div>
                <div class="title-right-buttons">
                    <button class="nav-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
                    <button class="nav-btn" id="homeBtn"><i class="fas fa-home"></i> 首页</button>
                </div>
            </div>
            <div class="nav-scroll" id="navScroll">
                <button class="nav-btn active" data-view="movie">电影</button>
                <button class="nav-btn" data-view="tv">连续剧</button>
                <button class="nav-btn" id="filterBtn"><i class="fas fa-filter"></i> 筛选</button>
                <button class="nav-btn" id="historyBtn">历史</button>
                <button class="nav-btn search-icon-btn" id="searchToggleBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>
            <div class="search-slide" id="searchSlide">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="请输入片名..." autocomplete="off">
                    <button id="searchConfirmBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="filter-slide" id="filterSlide">
                <div class="filter-slide-inner">
                    <div class="filter-section">
                        <div class="filter-title">排序</div>
                        <div class="filter-buttons-wrapper">
                            <div class="filter-buttons" id="sortButtons">
                                <button class="filter-btn" data-sort="rating">按评分</button>
                                <button class="filter-btn" data-sort="time">按时间</button>
                            </div>
                        </div>
                    </div>
                    <div class="filter-section">
                        <div class="filter-title">类型</div>
                        <div class="filter-buttons-wrapper" id="typeButtonsWrapper">
                            <div class="filter-buttons" id="typeButtons">
                                <!-- 动态生成 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="historyToolbar" class="history-toolbar" style="display: none;">
            <button class="clear-history-btn" id="clearHistoryBtn">清除观看记录</button>
            <button class="history-filter-btn" data-filter="series">连续剧</button>
            <button class="history-filter-btn" data-filter="movie">电影</button>
            <button class="history-filter-btn active" data-filter="all">全部</button>
        </div>

        <div id="listView">
            <div id="moviesContainer" class="movies-grid"></div>
            <div id="paginationArea" class="pagination-section" style="display: none;">
                <div class="page-circles" id="pageCircles"></div>
                <div class="page-nav-buttons">
                    <button class="page-nav" id="prevPageBtn">◀ 上一页</button>
                    <span id="pageIndicator" class="page-indicator">1/1</span>
                    <button class="page-nav" id="nextPageBtn">下一页 ▶</button>
                </div>
            </div>
        </div>

        <div id="searchResultView" style="display: none;">
            <div id="searchResultContainer" class="movies-grid"></div>
            <div id="searchResultPagination" class="pagination-section" style="display: none;">
                <div class="page-circles" id="searchPageCircles"></div>
                <div class="page-nav-buttons">
                    <button class="page-nav" id="searchPrevBtn">◀ 上一页</button>
                    <span id="searchPageIndicator" class="page-indicator">1/1</span>
                    <button class="page-nav" id="searchNextBtn">下一页 ▶</button>
                </div>
            </div>
        </div>

        <div id="episodeSelectorView" class="episode-selector">
            <div class="selector-header">
                <div class="selector-poster"><img id="episodePoster" src="" alt="海报"></div>
                <div class="selector-info-area"><div class="selector-title" id="episodeTitle"></div></div>
                <button class="back-btn" id="backToSeriesBtn"><i class="fas fa-arrow-left"></i> 返回</button>
                <div id="seriesStamp" class="stamp" style="display: none;"></div>
            </div>
            <div class="episode-header">剧集选择：</div>
            <div class="episodes-grid" id="episodesGrid"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let allMovies = [], allSeries = [], filteredMovies = [], filteredSeries = [];
    let currentPage = 1, itemsPerPage = 16;   // 固定每页16部影片
    let currentSearchKeyword = '';
    let currentSortMode = 'default';
    let currentFilterType = 'all', currentView = 'movie';
    let historyRecords = [], historyMap = {}, movieMap = {}, seriesMap = {};
    let seriesScrollPosition = 0, currentSeries = null;
    let globalSearchResults = [], globalSearchCurrentPage = 1, globalSearchTotal = 0;
    let currentHistoryFilter = 'all', prevViewBeforeHistory = null, prevScrollPosBeforeHistory = 0;
    
    // 筛选面板状态快照（用于取消筛选时恢复）
    let filterSnapshot = {
        scrollTop: 0,
        sortMode: 'default',
        filterType: 'all',
        page: 1,
        panelHeight: 0,      // 面板打开时占用的总垂直空间（包括margin）
        hasSnapshot: false
    };

    const appContainer = document.getElementById('appContainer');
    const moviesContainer = document.getElementById('moviesContainer');
    const paginationArea = document.getElementById('paginationArea');
    const pageCirclesDiv = document.getElementById('pageCircles');
    const prevBtn = document.getElementById('prevPageBtn'), nextBtn = document.getElementById('nextPageBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const searchSlide = document.getElementById('searchSlide'), searchToggleBtn = document.getElementById('searchToggleBtn');
    const searchInput = document.getElementById('searchInput'), searchConfirm = document.getElementById('searchConfirmBtn');
    const homeBtn = document.getElementById('homeBtn'), historyBtn = document.getElementById('historyBtn'), refreshBtn = document.getElementById('refreshBtn');
    const filterBtn = document.getElementById('filterBtn'), filterSlide = document.getElementById('filterSlide');
    const listView = document.getElementById('listView'), episodeSelectorView = document.getElementById('episodeSelectorView');
    const backToSeriesBtn = document.getElementById('backToSeriesBtn'), episodesGrid = document.getElementById('episodesGrid');
    const episodePoster = document.getElementById('episodePoster'), episodeTitle = document.getElementById('episodeTitle'), seriesStamp = document.getElementById('seriesStamp');
    const searchResultView = document.getElementById('searchResultView'), searchResultContainer = document.getElementById('searchResultContainer');
    const searchResultPagination = document.getElementById('searchResultPagination'), searchPageCircles = document.getElementById('searchPageCircles');
    const searchPrevBtn = document.getElementById('searchPrevBtn'), searchNextBtn = document.getElementById('searchNextBtn'), searchPageIndicator = document.getElementById('searchPageIndicator');
    const historyToolbar = document.getElementById('historyToolbar'), clearHistoryBtn = document.getElementById('clearHistoryBtn');

    function scrollToTop() { appContainer.scrollTo({ top: 0, behavior: 'smooth' }); }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
    function formatTime(s) { if (isNaN(s)) return '00:00:00'; let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60); return h>0 ? `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
    function extractPlayUrls(movie) { let lines = []; Object.keys(movie).filter(k=>k.startsWith('url')).sort((a,b)=>parseInt(a.replace('url',''))-parseInt(b.replace('url',''))).forEach((key,idx)=>{ let raw=movie[key]; if(!raw)return; let note='', clean=raw; let m=raw.match(/\(([^)]+)\)[^)]*$/); if(m){ note=m[1]; clean=raw.replace(/\s*\([^)]*\)\s*$/,'').trim(); } if(clean) lines.push({name:`线路${idx+1}`,url:clean,note}); }); return lines; }

    function goToPlayer(movie, resumeLine, resumeTime, jsitem, scaleObj, imageObj, isSeries, seriesPath) {
        let lines = extractPlayUrls(movie);
        if (lines.length === 0) { alert('暂无可用播放地址'); return; }
        let title = movie.name, poster = movie.img || '';
        let query = new URLSearchParams();
        query.set('title', title); query.set('poster', poster);
        query.set('lines', JSON.stringify(lines)); query.set('src', lines[0].url);
        if (resumeLine !== null && resumeTime !== null) {
            query.set('resumeLine', resumeLine);
            query.set('resumeTime', resumeTime);
            if (jsitem !== null) query.set('jsitem', jsitem);
            if (scaleObj) { for (let k in scaleObj) if (scaleObj[k] !== undefined) query.set(k, scaleObj[k]); }
            if (imageObj) { for (let k in imageObj) if (imageObj[k] !== undefined) query.set(k, imageObj[k]); }
        } else if (historyMap[title]) {
            let r = historyMap[title];
            query.set('resumeLine', r.lineIndex);

    function attachCardEvents() {
        document.querySelectorAll('.movie-card').forEach(c => {
            c.addEventListener('click', () => {
                if (c.dataset.movie) {
                    let movie = JSON.parse(c.dataset.movie);
                    let record = historyMap[movie.name];
                    if (record) {
                        let scaleObj = null, imageObj = null;
                        if (record.scale !== undefined || record.width !== undefined || record.height !== undefined || record.top !== undefined)
                            scaleObj = { scale: record.scale, width: record.width, height: record.height, top: record.top };
                        if (record.brightness !== undefined || record.contrast !== undefined || record.saturate !== undefined || record.hue !== undefined)
                            imageObj = { brightness: record.brightness, contrast: record.contrast, saturate: record.saturate, hue: record.hue };
                        goToPlayerAndSave(movie, record.lineIndex, record.time, record.jsitem, scaleObj, imageObj, false);
                    } else {
                        goToPlayerAndSave(movie);
                    }
                } else if (c.dataset.series) {
                    saveSeriesScrollPosition();
                    showEpisodeSelector(JSON.parse(c.dataset.series));
                }
            });
        });
    }

    async function showEpisodeSelector(series) { historyToolbar.style.display='none'; currentSeries=series; listView.style.display='none'; searchResultView.style.display='none'; episodeSelectorView.classList.add('active'); if(series.note) { seriesStamp.textContent=series.note; seriesStamp.style.display='flex'; } else seriesStamp.style.display='none'; let eps = await loadEpisodes(series.path); episodePoster.src = series.img||'https://placehold.co/300x450?text=No+Poster'; episodeTitle.textContent = series.pureName; episodesGrid.innerHTML=''; let hist = historyMap[series.pureName], highlight = hist?.jsitem||null; eps.forEach(ep=>{ let btn = document.createElement('div'); btn.className='episode-btn'; if (highlight && parseInt(ep.name)===highlight) { btn.classList.add('highlight'); btn.innerHTML=`<i class="fas fa-play-circle"></i> ${ep.name}`; } else btn.textContent=ep.name; btn.addEventListener('click',(e)=>{ e.stopPropagation(); let m = {name:series.pureName, img:series.img}; for(let k in ep) if(k.startsWith('url')) m[k]=ep[k]; let rec = historyMap[series.pureName], scaleObj=null, imageObj=null; if(rec){ if(rec.scale!==undefined||rec.width!==undefined||rec.height!==undefined||rec.top!==undefined) scaleObj={scale:rec.scale,width:rec.width,height:rec.height,top:rec.top}; if(rec.brightness!==undefined||rec.contrast!==undefined||rec.saturate!==undefined||rec.hue!==undefined) imageObj={brightness:rec.brightness,contrast:rec.contrast,saturate:rec.saturate,hue:rec.hue}; } goToPlayerAndSave(m, rec?.lineIndex||0, rec?.time||0, parseInt(ep.name), scaleObj, imageObj, true, series.path); }); episodesGrid.appendChild(btn); }); scrollToTop(); }
    async function loadEpisodes(path) { try { let r = await fetch(`./LXJ/${path}.json`); if(!r.ok) return []; let j = await r.json(); return j?.data_v||[]; } catch(e){ return []; } }

    function showLongPressMenu(card) {

    function renderHistoryView() {
        if (currentView!=='history') return;
        listView.classList.add('history-active'); paginationArea.style.display='none';

            html += `<div class="movie-card" data-title="${escapeHtml(item.title)}" data-line="${item.lineIndex}" data-time="${item.time}" data-jsitem="${item.jsitem||''}" data-type="${isMovie?'movie':'series'}" data-scale="${item.scale??''}" data-width="${item.width??''}" data-height="${item.height??''}" data-top="${item.top??''}" data-brightness="${item.brightness??''}" data-contrast="${item.contrast??''}" data-saturate="${item.saturate??''}" data-hue="${item.hue??''}"><div class="poster"><img src="${posterUrl}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Error'" draggable="false"><div class="rating"><i class="fas fa-star"></i> ${rating}</div><div class="type-badge ${isMovie?'movie':'series'}">${isMovie?'电影':'连续剧'}</div><div class="play-progress"><div><i class="fas fa-play-circle"></i> 继续播放 ${timeStr}${episodeText}</div></div></div><div class="movie-info"><div class="movie-title">${escapeHtml(item.title)}</div></div></div>`;

                let scaleObj = { scale: parseFloat(card.getAttribute('data-scale')), width: parseFloat(card.getAttribute('data-width')), height: parseFloat(card.getAttribute('data-height')), top: parseFloat(card.getAttribute('data-top')) };
                let imageObj = { brightness: parseFloat(card.getAttribute('data-brightness')), contrast: parseFloat(card.getAttribute('data-contrast')), saturate: parseFloat(card.getAttribute('data-saturate')), hue: parseFloat(card.getAttribute('data-hue')) };
                for (let k in scaleObj) if (isNaN(scaleObj[k])) delete scaleObj[k];
                for (let k in imageObj) if (isNaN(imageObj[k])) delete imageObj[k];
                if (type === 'movie') { let movieData = movieMap[title]; if (movieData) goToPlayerAndSave(movieData, lineIndex, time, jsitem, scaleObj, imageObj, false); else alert('影片信息缺失'); }
                else if (type === 'series') { let seriesData = seriesMap[title]; if (seriesData) await playSeriesFromHistory(seriesData, lineIndex, time, jsitem, scaleObj, imageObj); else alert('剧集信息缺失'); }
            });
            let longPressTimer = null;
            card.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => showLongPressMenu(card), 500); });
            card.addEventListener('touchend', () => { if (longPressTimer) clearTimeout(longPressTimer); });
            card.addEventListener('touchmove', () => { if (longPressTimer) clearTimeout(longPressTimer); });
            card.addEventListener('mousedown', (e) => { longPressTimer = setTimeout(() => showLongPressMenu(card), 500); });
            card.addEventListener('mouseup', () => { if (longPressTimer) clearTimeout(longPressTimer); });
            card.addEventListener('mouseleave', () => { if (longPressTimer) clearTimeout(longPressTimer); });
        });
        showHistoryTip();
    }

    function performGlobalSearch() { let kw = searchInput.value.trim(); if(!kw){ clearGlobalSearch(); return; } currentSearchKeyword=kw; let movieResults = allMovies.filter(m=>m.name&&m.name.toLowerCase().includes(kw.toLowerCase())); let seriesResults = allSeries.filter(s=>s.pureName&&s.pureName.toLowerCase().includes(kw.toLowerCase())); globalSearchResults = [...movieResults.map(m=>({type:'movie',data:m})), ...seriesResults.map(s=>({type:'series',data:s}))]; globalSearchTotal = globalSearchResults.length; globalSearchCurrentPage=1; renderGlobalSearch(); listView.style.display='none'; episodeSelectorView.classList.remove('active'); searchResultView.style.display='block'; historyToolbar.style.display='none'; scrollToTop(); }

pisodeSelector(item.data); } }); }); let totalPages=Math.ceil(globalSearchTotal/itemsPerPage); if(totalPages<=1)searchResultPagination.style.display='none'; else { searchResultPagination.style.display='flex'; searchPageIndicator.textContent = `${globalSearchCurrentPage}/${totalPages}`; let circlesHtml=''; for(let i=1;i<=totalPages;i++)circlesHtml+=`<div class="page-circle ${i===globalSearchCurrentPage?'active-page':''}" data-page="${i}">${i}</div>`; searchPageCircles.innerHTML=circlesHtml; document.querySelectorAll('#searchPageCircles .page-circle').forEach(c=>c.addEventListener('click',()=>{let p=parseInt(c.getAttribute('data-page')); if(p&&p!==globalSearchCurrentPage){ globalSearchCurrentPage=p; renderGlobalSearch(); }})); searchPrevBtn.classList.toggle('disabled',globalSearchCurrentPage===1); searchNextBtn.classList.toggle('disabled',globalSearchCurrentPage===totalPages); } }

    function switchToMovieView(){
        removeHistoryTip();
        if(episodeSelectorView.classList.contains('active')) hideEpisodeSelector();
        if(searchResultView.style.display==='block') clearGlobalSearch();
        filterSnapshot.hasSnapshot = false;
        resetFilterAndClosePanel();
        if (currentView === 'movie') {
            applyMovieFilterAndRender(true);
            scrollToTop();
            return;
        }
        currentView = 'movie';
        listView.classList.remove('history-active');
        if(searchSlide.classList.contains('open')){ searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); }
        currentSearchKeyword = '';
        searchInput.value = '';
        applyMovieFilterAndRender(true);
        paginationArea.style.display = 'flex';
        setActiveNavByView('movie');
        filterBtn.disabled = false;
        scrollToTop();
    }
    
    function switchToHistoryView(){
        if(currentView!=='history'){ prevViewBeforeHistory=currentView; prevScrollPosBeforeHistory=appContainer.scrollTop; }
        filterSnapshot.hasSnapshot = false;
        resetFilterAndClosePanel();
        if(currentView==='history'){ scrollToTop(); return; }
        currentView='history'; listView.classList.add('history-active'); hideEpisodeSelector();
        if(searchResultView.style.display==='block') clearGlobalSearch();
        if(searchSlide.classList.contains('open')){ searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); }
        currentSearchKeyword=''; searchInput.value='';
        loadHistoryFromIApp(); renderHistoryView(); paginationArea.style.display='none';
        setActiveNavByView('history'); filterBtn.disabled=true; scrollToTop();
    }

    function goHome() {
        if (currentView !== 'movie') {
            switchToMovieView();
        } else {
            filterSnapshot.hasSnapshot = false;
            resetFilterAndClosePanel();
            currentPage = 1;
            applyMovieFilterAndRender(true);
            scrollToTop();
        }
    }

    function setActiveNavByView(view){ document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); if(view==='movie') document.querySelector('[data-view="movie"]')?.classList.add('active'); else if(view==='tv') document.querySelector('[data-view="tv"]')?.classList.add('active'); else if(view==='history') historyBtn.classList.add('active'); historyToolbar.style.display = view==='history' ? 'flex' : 'none'; }
    function updateSearchToggleButtonText(isOpen){ searchToggleBtn.innerHTML = isOpen ? '<i class="fas fa-times"></i> 取消' : '<i class="fas fa-search"></i> 搜索'; searchToggleBtn.classList.toggle('active', isOpen); }
    function closeSearch(){ if(searchSlide.classList.contains('open')){ searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); } }
    function openSearch(){ if(!searchSlide.classList.contains('open')){ searchSlide.classList.add('open'); updateSearchToggleButtonText(true); searchInput.focus(); } }

    function collectAllTypes() { let set = new Set(); [...allMovies, ...allSeries].forEach(item=>{ if(item.genre) item.genre.split('/').forEach(t=>{ let tt=t.trim(); if(tt && tt!=='情色' && tt!=='伦理') set.add(tt); }); }); return [...set].sort(); }
    function generateTypeButtons() {
        const container = document.getElementById('typeButtons');
        if(!container) return;
        let types = collectAllTypes();
        let sourceData = (currentView === 'movie') ? allMovies : (currentView === 'tv') ? allSeries : [...allMovies, ...allSeries];
        let typeCounts = {};
        types.forEach(t => { typeCounts[t] = 0; });
        sourceData.forEach(item => { if (item.genre) { item.genre.split('/').forEach(t => { let tt = t.trim(); if (typeCounts[tt] !== undefined) typeCounts[tt]++; }); } });
        types.sort((a, b) => typeCounts[b] - typeCounts[a]);
        let totalCount = sourceData.length;
        let html = `<span class="filter-btn-wrapper"><button class="filter-btn ${currentFilterType==='all'?'active':''}" data-type="all">全部</button><span class="filter-count">${totalCount}</span></span>`;
        types.forEach(t => { html += `<span class="filter-btn-wrapper"><button class="filter-btn ${currentFilterType===t?'active':''}" data-type="${escapeHtml(t)}">${escapeHtml(t)}</button><span class="filter-count">${typeCounts[t] || 0}</span></span>`; });
        container.innerHTML = html;
        container.querySelectorAll('.filter-btn').forEach(b => { b.addEventListener('click', () => { currentFilterType = b.dataset.type==='all'?'all':b.dataset.type; container.querySelectorAll('.filter-btn').forEach(c=>c.classList.remove('active')); b.classList.add('active'); if(currentView==='movie') applyMovieFilterAndRender(true); else if(currentView==='tv') applySeriesFilterAndRender(true); scrollToTop(); }); });
    }
    function updateSortButtonsUI() { document.querySelectorAll('#sortButtons .filter-btn').forEach(b=>{ b.classList.toggle('active', b.dataset.sort===currentSortMode); }); }
    function setSortMode(mode) { 
        currentSortMode = (currentSortMode===mode) ? 'default' : mode; 
        updateSortButtonsUI(); 
        if(currentView==='movie') applyMovieFilterAndRender(true); 
        else if(currentView==='tv') applySeriesFilterAndRender(true); 
        scrollToTop(); 
    }
    
    function toggleFilterPanel() { 
        if(filterSlide.classList.contains('open')){ 
            // 关闭面板：恢复快照状态（排序、类型、页码），然后恢复滚动位置（减去面板高度）
            if (filterSnapshot.hasSnapshot) {
                const needRerender = (currentSortMode !== filterSnapshot.sortMode) || (currentFilterType !== filterSnapshot.filterType);
                // 恢复排序和类型
                if (needRerender) {
                    currentSortMode = filterSnapshot.sortMode;
                    updateSortButtonsUI();
                    currentFilterType = filterSnapshot.filterType;
                    generateTypeButtons(); // 重新生成类型按钮并高亮
                    // 恢复页码
                    currentPage = filterSnapshot.page;
                    // 重新渲染列表（不重置页码）
                    if (currentView === 'movie') applyMovieFilterAndRender(false);
                    else if (currentView === 'tv') applySeriesFilterAndRender(false);
                } else {
                    // 如果筛选条件未变，只需恢复页码（可能用户只是打开又关闭，没有改动）
                    if (currentPage !== filterSnapshot.page) {
                        currentPage = filterSnapshot.page;
                        if (currentView === 'movie') applyMovieFilterAndRender(false);
                        else if (currentView === 'tv') applySeriesFilterAndRender(false);
                    }
                }
                // 强制浏览器重排，确保布局稳定
                void appContainer.offsetHeight;
                // 恢复滚动位置：打开时的滚动位置 - 面板总高度（补偿面板收起后的上移）
                let targetScroll = filterSnapshot.scrollTop - filterSnapshot.panelHeight;
                if (targetScroll < 0) targetScroll = 0;
                // 等待渲染完成后再设置滚动位置
                setTimeout(() => {
                    appContainer.scrollTo({ top: targetScroll, behavior: 'auto' });
                }, 30);
            }
            // 折叠面板
            filterSlide.classList.remove('open');
            filterBtn.innerHTML = '<i class="fas fa-filter"></i> 筛选';
            filterBtn.classList.remove('active');
            // 清除快照
            filterSnapshot.hasSnapshot = false;
        } else { 
            // 打开面板：保存当前状态快照，并精确测量面板总高度（包括margin）
            filterSnapshot.scrollTop = appContainer.scrollTop;
            filterSnapshot.sortMode = currentSortMode;
            filterSnapshot.filterType = currentFilterType;
            filterSnapshot.page = currentPage;
            
            // 临时添加测量类（禁用过渡），添加 open 类，获取完整尺寸
            filterSlide.classList.add('filter-slide--measuring');
            filterSlide.classList.add('open');
            // 获取元素占用的总垂直空间（高度 + margin）
            const rect = filterSlide.getBoundingClientRect();
            const styles = getComputedStyle(filterSlide);
            const marginTop = parseFloat(styles.marginTop);
            const marginBottom = parseFloat(styles.marginBottom);
            const totalHeight = rect.height + marginTop + marginBottom;
            filterSnapshot.panelHeight = totalHeight;
            // 移除测量类和 open 类（准备正式添加过渡）
            filterSlide.classList.remove('filter-slide--measuring');
            filterSlide.classList.remove('open');
            
            // 正式打开，添加过渡效果
            filterSlide.classList.add('open'); 
            filterBtn.innerHTML = '<i class="fas fa-times"></i> 筛选';
            filterBtn.classList.add('active');
            if(searchSlide.classList.contains('open')){ 
                searchSlide.classList.remove('open'); 
                updateSearchToggleButtonText(false); 
            } 
            filterSnapshot.hasSnapshot = true;
            generateTypeButtons();
        } 
    }

    // ---------- 状态保存与恢复 ----------
    function saveCurrentState() {
        localStorage.setItem('savedScrollPosition', appContainer.scrollTop);
        localStorage.setItem('savedCurrentView', currentView);
        localStorage.setItem('savedCurrentPage', currentPage);
        localStorage.setItem('savedCurrentSearchKeyword', currentSearchKeyword);
        localStorage.setItem('savedCurrentSortMode', currentSortMode);
        localStorage.setItem('savedCurrentFilterType', currentFilterType);
        localStorage.setItem('savedHistoryFilter', currentHistoryFilter);
        localStorage.setItem('savedEpisodeSelectorVisible', episodeSelectorView.classList.contains('active'));
        localStorage.setItem('savedSearchResultVisible', searchResultView.style.display === 'block');
        localStorage.setItem('savedFilterPanelOpen', filterSlide.classList.contains('open'));
        if (episodeSelectorView.classList.contains('active') && currentSeries) {
            localStorage.setItem('savedCurrentSeries', JSON.stringify(currentSeries));
            localStorage.setItem('savedEpisodeTitle', episodeTitle.textContent);
            localStorage.setItem('savedEpisodePoster', episodePoster.src);
            localStorage.setItem('savedSeriesStamp', seriesStamp.style.display==='flex' ? seriesStamp.textContent : '');
            localStorage.setItem('savedEpisodeGridHTML', episodesGrid.innerHTML);
        } else {
            localStorage.removeItem('savedCurrentSeries'); localStorage.removeItem('savedEpisodeTitle'); localStorage.removeItem('savedEpisodePoster');
            localStorage.removeItem('savedSeriesStamp'); localStorage.removeItem('savedEpisodeGridHTML');
        }
    }

    function restoreSavedState() {
        const scrollPos = localStorage.getItem('savedScrollPosition');
        const view = localStorage.getItem('savedCurrentView');
        const page = localStorage.getItem('savedCurrentPage');
        const kw = localStorage.getItem('savedCurrentSearchKeyword');
        const sort = localStorage.getItem('savedCurrentSortMode');
        const fType = localStorage.getItem('savedCurrentFilterType');
        const hFilter = localStorage.getItem('savedHistoryFilter');
        const epVisible = localStorage.getItem('savedEpisodeSelectorVisible') === 'true';
        const searchResultWasVisible = localStorage.getItem('savedSearchResultVisible') === 'true';
        const filterPanelWasOpen = localStorage.getItem('savedFilterPanelOpen') === 'true';

        if (view === 'movie' || view === 'tv' || view === 'history') currentView = view;
        else currentView = 'movie';
        if (page && !isNaN(parseInt(page))) currentPage = parseInt(page);
        currentSearchKeyword = kw || '';
        currentSortMode = (sort === 'rating' || sort === 'time' || sort === 'default') ? sort : 'default';
        currentFilterType = fType || 'all';
        currentHistoryFilter = (hFilter === 'all' || hFilter === 'movie' || hFilter === 'series') ? hFilter : 'all';

        // 重置面板和筛选条件（避免恢复时面板意外打开）
        if (filterSlide.classList.contains('open')) {
            filterSlide.classList.remove('open');
            filterBtn.innerHTML = '<i class="fas fa-filter"></i> 筛选';
            filterBtn.classList.remove('active');
        }
        filterSnapshot.hasSnapshot = false;

        if (searchResultWasVisible && (currentView === 'movie' || currentView === 'tv')) {
            searchResultView.style.display = 'none';
            listView.style.display = 'block';
            searchInput.value = '';
            currentSearchKeyword = '';
            globalSearchResults = [];
            searchSlide.classList.remove('open');
            updateSearchToggleButtonText(false);
            if (currentView === 'movie') {
                applyMovieFilterAndRender(false);
            } else if (currentView === 'tv') {
                applySeriesFilterAndRender(false);
            }
        } else {
            if (currentView === 'movie') {
                applyMovieFilterAndRender(false);
            } else if (currentView === 'tv') {
                applySeriesFilterAndRender(false);
            } else if (currentView === 'history') {
                loadHistoryFromIApp();
                renderHistoryView();
                setHistoryFilter(currentHistoryFilter);
            }
        }

        setActiveNavByView(currentView);
        filterBtn.disabled = (currentView === 'history');
        filterBtn.innerHTML = '<i class="fas fa-filter"></i> 筛选';
        filterBtn.classList.remove('active');
        updateSortButtonsUI();
        generateTypeButtons();

        if (epVisible) {
            const savedSeriesStr = localStorage.getItem('savedCurrentSeries');
            if (savedSeriesStr) {
                try {
                    savedCurrentSeries = JSON.parse(savedSeriesStr); currentSeries = savedCurrentSeries;
                    episodeTitle.textContent = localStorage.getItem('savedEpisodeTitle') || '';
                    episodePoster.src = localStorage.getItem('savedEpisodePoster') || '';
                    const stampText = localStorage.getItem('savedSeriesStamp');
                    if (stampText) { seriesStamp.textContent = stampText; seriesStamp.style.display = 'flex'; }
                    else seriesStamp.style.display = 'none';
                    episodesGrid.innerHTML = localStorage.getItem('savedEpisodeGridHTML') || '';
                    if (typeof refreshEpisodeHighlight === 'function') refreshEpisodeHighlight();
                    listView.style.display = 'none'; searchResultView.style.display = 'none';
                    episodeSelectorView.classList.add('active'); historyToolbar.style.display = 'none';
                } catch(e) { console.error('恢复剧集选择器失败', e); }
            }
        }

        if (scrollPos && !isNaN(parseInt(scrollPos))) {
            setTimeout(() => appContainer.scrollTo({ top: parseInt(scrollPos), behavior: 'auto' }), 100);
        }
        setTimeout(() => {
            ['savedScrollPosition','savedCurrentView','savedCurrentPage','savedCurrentSearchKeyword','savedCurrentSortMode','savedCurrentFilterType','savedHistoryFilter','savedEpisodeSelectorVisible','savedSearchResultVisible','savedFilterPanelOpen','savedCurrentSeries','savedEpisodeTitle','savedEpisodePoster','savedSeriesStamp','savedEpisodeGridHTML'].forEach(k => localStorage.removeItem(k));
        }, 1000);
    }

    let historyTipElement = null;
    function showHistoryTip() {
        if (currentView !== 'history') return;
        if (sessionStorage.getItem('historyTipShown')) return;
        sessionStorage.setItem('historyTipShown', '1');
        if (historyTipElement) historyTipElement.remove();
        let tip = document.createElement('div'); tip.className = 'scroll-tip-container';
        tip.innerHTML = '<div class="scroll-tip-text">✨ 可长按单个视频进行删除 ✨</div>';
        historyToolbar.insertAdjacentElement('afterend', tip);
        historyTipElement = tip;
        tip.querySelector('.scroll-tip-text').addEventListener('animationend', function(e) {
            if (e.animationName === 'scrollTip') { if (historyTipElement) historyTipElement.remove(); historyTipElement = null; }
        });
    }
    function removeHistoryTip() { if (historyTipElement) { historyTipElement.remove(); historyTipElement = null; } }

    function refreshEpisodeHighlight() {
        if (!currentSeries) return;
        loadHistoryFromIApp();
        const highlight = historyMap[currentSeries.pureName]?.jsitem || null;
        episodesGrid.querySelectorAll('.episode-btn').forEach(btn => {
            const num = parseInt(btn.textContent.replace(/[^0-9]/g, ''));
            if (highlight && num === highlight) { btn.classList.add('highlight'); btn.innerHTML = `<i class="fas fa-play-circle"></i> ${num}`; }
            else { btn.classList.remove('highlight'); btn.innerHTML = num; }
        });
    }

    let pendingBack = false;
    Object.defineProperty(window, 'quitSignal', {
        set: function(v) {
            if (v !== 1 || pendingBack) return;
            pendingBack = true;
            setTimeout(() => {
                try {
                    if (episodeSelectorView.classList.contains('active')) { hideEpisodeSelector(); pendingBack = false; return; }
                    if (searchResultView.style.display === 'block') { clearGlobalSearch(); pendingBack = false; return; }
                    if (currentView === 'history') {
                        let target = prevViewBeforeHistory === 'movie' ? 'movie' : (prevViewBeforeHistory === 'tv' ? 'tv' : 'movie');
                        let savedScroll = prevScrollPosBeforeHistory;
                        if (target === 'movie') switchToMovieView();
                        else switchToTVView();
                        if (savedScroll > 0) setTimeout(() => appContainer.scrollTo({ top: savedScroll, behavior: 'auto' }), 50);
                        pendingBack = false; return;
                    }
                    if (typeof iapp !== 'undefined' && iapp.s) iapp.s('sss.exit', 'exit');
                } catch (e) { console.error(e); } finally { pendingBack = false; }
            }, 10);
        },
        get: function() { return null; }
    });

    function initButtons() {
        document.querySelector('[data-view="movie"]')?.addEventListener('click', switchToMovieView);
        document.querySelector('[data-view="tv"]')?.addEventListener('click', switchToTVView);
        filterBtn?.addEventListener('click', toggleFilterPanel);
        refreshBtn?.addEventListener('click', async () => { await loadAllData(); if(currentView==='movie') applyMovieFilterAndRender(true); else if(currentView==='tv') applySeriesFilterAndRender(true); else if(currentView==='history'){ loadHistoryFromIApp(); renderHistoryView(); } scrollToTop(); });
        homeBtn?.addEventListener('click', goHome);
        historyBtn?.addEventListener('click', switchToHistoryView);
        backToSeriesBtn?.addEventListener('click', hideEpisodeSelector);
        searchToggleBtn?.addEventListener('click', searchToggleHandler);
        // 修复：搜索后不自动关闭搜索框
        searchConfirm.addEventListener('click', () => { 
            if(currentView==='history'){ 
                currentSearchKeyword=searchInput.value.trim(); 
                renderHistoryView(); 
                // 不关闭搜索框
            } else { 
                performGlobalSearch(); 
                // 不关闭搜索框
            } 
        });
        searchInput.addEventListener('keypress', e => { 
            if(e.key==='Enter'){ 
                if(currentView==='history'){ 
                    currentSearchKeyword=searchInput.value.trim(); 
                    renderHistoryView(); 
                    // 不关闭搜索框
                } else { 
                    performGlobalSearch(); 
                    // 不关闭搜索框
                } 
            } 
        });
        prevBtn.addEventListener('click', goPrevPage);
        nextBtn.addEventListener('click', goNextPage);
        searchPrevBtn.addEventListener('click', () => { if(globalSearchCurrentPage>1){ globalSearchCurrentPage--; renderGlobalSearch(); } });
        searchNextBtn.addEventListener('click', () => { let pages=Math.ceil(globalSearchTotal/itemsPerPage); if(globalSearchCurrentPage<pages){ globalSearchCurrentPage++; renderGlobalSearch(); } });
        document.querySelectorAll('.history-filter-btn').forEach(b => b.addEventListener('click', () => setHistoryFilter(b.dataset.filter)));
        document.querySelectorAll('#sortButtons .filter-btn').forEach(b => b.addEventListener('click', () => setSortMode(b.dataset.sort)));
        clearHistoryBtn?.addEventListener('click', () => {
            if (currentView !== 'history') return;
            if (confirm('确定要清除所有观看记录吗？')) {
                if (typeof iapp !== 'undefined' && iapp.fn) { iapp.fn('history_manager.clear("1")'); setTimeout(() => { loadHistoryFromIApp(); renderHistoryView(); }, 500); }
                else alert("无法连接到 iApp 环境");
            }
        });
    }

    function searchToggleHandler(e) {
        e.stopPropagation();
        if (searchSlide.classList.contains('open')) {
            // 如果搜索面板打开，则关闭并清除搜索结果
            clearGlobalSearch();
        } else {
            openSearch();
        }
        if (filterSlide.classList.contains('open')) {
            // 打开搜索时如果筛选面板打开，则关闭并恢复快照（注意：clearGlobalSearch 已处理搜索结果，但这里需要额外处理筛选面板）
            if (filterSnapshot.hasSnapshot) {
                // 恢复快照
                const needRerender = (currentSortMode !== filterSnapshot.sortMode) || (currentFilterType !== filterSnapshot.filterType);
                if (needRerender) {
                    currentSortMode = filterSnapshot.sortMode;
                    updateSortButtonsUI();
                    currentFilterType = filterSnapshot.filterType;
                    generateTypeButtons();
                    currentPage = filterSnapshot.page;
                    if (currentView === 'movie') applyMovieFilterAndRender(false);
                    else if (currentView === 'tv') applySeriesFilterAndRender(false);
                } else if (currentPage !== filterSnapshot.page) {
                    currentPage = filterSnapshot.page;
                    if (currentView === 'movie') applyMovieFilterAndRender(false);
                    else if (currentView === 'tv') applySeriesFilterAndRender(false);
                }
                void appContainer.offsetHeight;
                let targetScroll = filterSnapshot.scrollTop - filterSnapshot.panelHeight;
                if (targetScroll < 0) targetScroll = 0;
                setTimeout(() => {
                    appContainer.scrollTo({ top: targetScroll, behavior: 'auto' });
                }, 30);
            }
            filterSlide.classList.remove('open');
            filterBtn.innerHTML = '<i class="fas fa-filter"></i> 筛选';
            filterBtn.classList.remove('active');
            filterSnapshot.hasSnapshot = false;
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            if (currentView === 'history') { loadHistoryFromIApp(); renderHistoryView(); setHistoryFilter(currentHistoryFilter); }
            else if (episodeSelectorView.classList.contains('active') && currentSeries) refreshEpisodeHighlight();
        }
    });

    async function init() {
        loadHistoryFromIApp();
        await loadAllData();
        initButtons();
        restoreSavedState();
        updateSortButtonsUI();
        scrollToTop();
    }
    init();
</script>
</body>
</html>
