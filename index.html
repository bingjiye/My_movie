<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的影院 - 在线影视</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== 原有样式（未修改） ========== */
        :root { --bg-primary: #0a0e12; --bg-secondary: #1a1e24; --card-bg: #14181f; --text-primary: #ffffff; --text-secondary: #cceeff; --accent-color: #ff5722; --border-color: #2a2e35; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        /* 禁用长按拖拽图片 */
        img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
        html, body, .app-container, .movies-grid, .episodes-grid, .recommend-scroll, .episode-list-outer, .page-circles, .nav-scroll, .episode-selector .episodes-grid, .header-sticky, .selector-header, #episodesGrid, .movies-grid, .episodes-grid, #searchResultContainer, #moviesContainer, #episodesGrid, .history-toolbar {
            scrollbar-width: none; -ms-overflow-style: none;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar, .app-container::-webkit-scrollbar, .movies-grid::-webkit-scrollbar, .episodes-grid::-webkit-scrollbar, .recommend-scroll::-webkit-scrollbar, .episode-list-outer::-webkit-scrollbar, .page-circles::-webkit-scrollbar, .nav-scroll::-webkit-scrollbar, .episode-selector .episodes-grid::-webkit-scrollbar, .header-sticky::-webkit-scrollbar, .selector-header::-webkit-scrollbar, #episodesGrid::-webkit-scrollbar, #searchResultContainer::-webkit-scrollbar, #moviesContainer::-webkit-scrollbar, .history-toolbar::-webkit-scrollbar {
            display: none;
        }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; z-index: 0; }
        .app-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100000000; background: var(--bg-primary); overflow-y: auto; padding: 0 20px 40px 20px; display: flex; flex-direction: column; }
        .content-wrapper { max-width: 1600px; width: 100%; margin: 0 auto; flex: 1; }
        .header-sticky { position: sticky; top: 0; background: rgba(10,14,18,0.92); backdrop-filter: blur(12px); z-index: 100; padding: 16px 0 12px 0; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .title-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .site-title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff, var(--accent-color)); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 1px; }
        .title-right-buttons { display: flex; gap: 12px; }
        .title-right-buttons .nav-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
        .nav-scroll { overflow-x: auto; overflow-y: hidden; white-space: nowrap; scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch; display: flex; gap: 8px; padding-bottom: 6px; justify-content: flex-end; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .nav-btn i { font-size: 16px; }
        .nav-btn:active, .movie-card:active, .episode-btn:active, .page-circle:active, .page-nav:active, .back-btn:active { transform: none; background: inherit; opacity: 0.8; }
        .movie-card:active { transform: none; }
        .nav-btn.active { background: var(--accent-color); color: white; box-shadow: 0 2px 8px rgba(255,87,34,0.4); }
        .search-icon-btn { background: var(--bg-secondary); color: var(--text-secondary); }
        .search-slide { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; margin-top: 8px; }
        .search-slide.open { max-height: 80px; }
        .search-box { background: var(--bg-secondary); border-radius: 48px; padding: 4px 16px; display: flex; align-items: center; border: 1px solid var(--border-color); }
        .search-box input { flex: 1; background: transparent; border: none; padding: 8px 0; color: white; font-size: 15px; outline: none; }
        .search-box input::placeholder { color: #8e9aaf; }
        .search-box button { background: var(--accent-color); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: opacity 0.2s; }
        .movies-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); margin-top: 12px; margin-bottom: 40px; }
        .movie-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; transition: box-shadow 0.2s; cursor: pointer; position: relative; box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .movie-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .poster { position: relative; aspect-ratio: 2 / 3; background: #0f1117; overflow: hidden; }
        .poster img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.25s; pointer-events: none; } /* 避免拖拽图片 */
        .movie-card:hover .poster img { transform: scale(1.03); }
        .rating { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #ffc107; border-left: 2px solid var(--accent-color); z-index: 2; }
        .rating i { font-size: 10px; margin-right: 3px; color: #ffb347; }
        .type-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; z-index: 2; display: none; pointer-events: none; }
        .type-badge.movie { background: rgba(255,87,34,0.95); }
        .type-badge.series { background: rgba(33,150,243,0.95); }
        #searchResultView .type-badge, #listView.history-active .type-badge { display: inline-block; }
        .series-note { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #ffdbca; font-family: monospace; z-index: 2; }
        .movie-info { padding: 12px 10px; position: relative; }
        .movie-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f0f0f0; }
        .play-progress { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; color: #ffdbca; font-family: monospace; z-index: 2; display: flex; flex-direction: column; gap: 2px; line-height: 1.3; pointer-events: none; }
        .play-progress > div:first-child { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .play-progress i { font-size: 10px; color: #ffaa88; }
        .play-progress span { font-size: 10px; color: #ffaa88; white-space: nowrap; }
        .play-progress .episode-row { font-size: 10px; color: #ffc107; margin-top: 2px; }
        .pagination-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .page-circles { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 4px; max-width: 100%; justify-content: center; flex-wrap: nowrap; scrollbar-width: none; -ms-overflow-style: none; }
        .page-circles::-webkit-scrollbar { display: none; }
        .page-circle { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); border-radius: 50%; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: 1px solid var(--border-color); color: var(--text-secondary); }
        .page-circle.active-page { background: var(--accent-color); color: white; box-shadow: 0 0 10px var(--accent-color); transform: none; border-color: var(--accent-color); }
        .page-nav-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .page-nav { background: var(--bg-secondary); border: none; padding: 8px 24px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; transition: opacity 0.2s; font-size: 14px; }
        .page-nav.disabled { opacity: 0.4; pointer-events: none; }
        .page-nav:active { opacity: 0.7; transform: none; }
        .page-indicator { font-size: 15px; font-weight: 500; color: var(--text-secondary); background: var(--bg-secondary); padding: 4px 12px; border-radius: 30px; min-width: 70px; text-align: center; }
        .empty-msg { text-align: center; padding: 60px; color: #aaa; font-size: 18px; }
        .history-toolbar { position: sticky; top: 72px; z-index: 99; display: flex; justify-content: flex-end; margin: 0 0 16px 0; padding: 6px 12px; background: rgba(10,14,18,0.96); backdrop-filter: blur(12px); border-radius: 48px; width: fit-content; margin-left: auto; gap: 12px; border: 1px solid var(--border-color); pointer-events: auto; }
        .history-filter-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 13px; padding: 4px 14px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .history-filter-btn.active { background: var(--accent-color); color: white; }
        .clear-history-btn { background: rgba(30,30,40,0.9); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 13px; padding: 4px 14px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .clear-history-btn:active { opacity: 0.7; background: var(--accent-color); color: white; transform: none; }
        
        /* 长按菜单样式（唯一性通过 JS 保证）*/
        .longpress-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 12px; background: transparent; backdrop-filter: none; border: none; box-shadow: none; padding: 0; z-index: 1000; }
        .longpress-menu button { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; min-width: 100px; text-align: center; }
        .longpress-menu button.delete-btn { background: #d32f2f; color: white; border-color: #ff6659; }
        .longpress-menu button.cancel-btn { background: #2c2e3a; color: #eee; border-color: #4a4e5a; }
        .longpress-menu button:active { opacity: 0.8; transform: scale(0.96); }
        
        /* 滚动提示样式（水平滚动 + 呼吸） */
        .scroll-tip-container { width: 100%; overflow: hidden; margin: 8px 0 0 0; background: rgba(255,87,34,0.15); border-radius: 30px; backdrop-filter: blur(4px); }
        .scroll-tip-text { display: inline-block; white-space: nowrap; padding: 6px 0; font-size: 13px; color: #ffaa88; animation: breatheTip 1s ease-in-out infinite, scrollTip 12s linear 2; }
        @keyframes breatheTip { 0% { opacity: 0.6; text-shadow: 0 0 0px #ff5722; } 50% { opacity: 1; text-shadow: 0 0 6px #ff5722; } 100% { opacity: 0.6; text-shadow: 0 0 0px #ff5722; } }
        @keyframes scrollTip { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .episode-selector { display: none; animation: fadeIn 0.2s ease; }
        .episode-selector.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .selector-header { position: relative; display: flex; gap: 20px; margin-bottom: 20px; background: var(--bg-secondary); border-radius: 20px; padding: 16px; align-items: flex-end; }
        .selector-poster { width: 120px; flex-shrink: 0; }
        .selector-poster img { width: 100%; border-radius: 12px; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .selector-info-area { flex: 1; min-width: 0; }
        .selector-title { font-size: 22px; font-weight: bold; color: #fff; line-height: 1.35; word-break: break-word; white-space: normal; overflow: visible; }
        .back-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: opacity 0.2s; backdrop-filter: blur(4px); z-index: 5; white-space: nowrap; }
        .back-btn i { font-size: 14px; }
        .back-btn:active { opacity: 0.7; transform: none; background: rgba(255,255,255,0.15); }
        .stamp { position: absolute; left: 140px; top: 70px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid #ff5722; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #ff5722; text-align: center; backdrop-filter: blur(2px); box-shadow: 0 0 0 1px rgba(255,87,34,0.3), inset 0 0 0 1px rgba(255,87,34,0.2); transform: rotate(-5deg); z-index: 6; pointer-events: none; font-family: "KaiTi", "楷体", "STKaiti", serif; letter-spacing: 1px; }
        @media (max-width: 640px) {
            .selector-header { gap: 12px; padding: 12px; align-items: flex-end; }
            .selector-poster { width: 90px; }
            .selector-title { font-size: 18px; }
            .back-btn { padding: 6px 12px; font-size: 13px; top: 12px; right: 12px; }
            .stamp { left: 110px; width: 50px; height: 50px; font-size: 12px; top: 55px; }
            .history-toolbar { top: 65px; gap: 6px; padding: 4px 10px; }
            .history-filter-btn, .clear-history-btn { font-size: 11px; padding: 3px 10px; }
        }
        .episode-header { margin: 15px 0 12px 0; padding-left: 8px; font-size: 16px; font-weight: 600; color: var(--accent-color); letter-spacing: 1px; border-left: 3px solid var(--accent-color); }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, auto)); gap: 12px; margin-top: 5px; max-height: 60vh; overflow-y: auto; padding: 8px 4px; scrollbar-width: none; }
        .episode-btn { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 0; text-align: center; cursor: pointer; transition: all 0.2s ease; font-size: 16px; font-weight: 500; color: var(--text-secondary); position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .episode-btn.highlight { background: var(--accent-color); color: white; border-color: #ff784e; box-shadow: 0 0 0 0 rgba(255,87,34,0.6); animation: strong-breathe 1s infinite ease-in-out; font-weight: bold; }
        .episode-btn.highlight i { margin-right: 6px; font-size: 14px; }
        @keyframes strong-breathe { 0% { box-shadow: 0 0 0 0 rgba(255,87,34,0.8); transform: scale(1); } 50% { box-shadow: 0 0 0 10px rgba(255,87,34,0); transform: scale(1.02); background: #ff6a3a; } 100% { box-shadow: 0 0 0 0 rgba(255,87,34,0); transform: scale(1); } }
        .episode-btn:active { opacity: 0.7; transform: none; background: var(--accent-color); color: white; }
        footer { display: none; }
        @media (max-width: 640px) { .movies-grid { gap: 14px; } .site-title { font-size: 22px; } .nav-btn { padding: 6px 12px; font-size: 13px; } .title-right-buttons .nav-btn { padding: 6px 12px; font-size: 13px; } }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="content-wrapper">
        <div class="header-sticky">
            <div class="title-bar">
                <div class="site-title">我的影院</div>
                <div class="title-right-buttons">
                    <button class="nav-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
                    <button class="nav-btn" id="homeBtn"><i class="fas fa-home"></i> 首页</button>
                </div>
            </div>
            <div class="nav-scroll" id="navScroll">
                <button class="nav-btn active" data-view="movie">电影</button>
                <button class="nav-btn" data-view="tv">连续剧</button>
                <button class="nav-btn rating-btn" data-view="rating">按评分</button>
                <button class="nav-btn" id="historyBtn">历史</button>
                <button class="nav-btn search-icon-btn" id="searchToggleBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>
            <div class="search-slide" id="searchSlide">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="请输入片名..." autocomplete="off">
                    <button id="searchConfirmBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>

        <div id="historyToolbar" class="history-toolbar" style="display: none;">
            <button class="clear-history-btn" id="clearHistoryBtn">清除观看记录</button>
            <button class="history-filter-btn" data-filter="series">连续剧</button>
            <button class="history-filter-btn" data-filter="movie">电影</button>
            <button class="history-filter-btn active" data-filter="all">全部</button>
        </div>

        <div id="listView">
            <div id="moviesContainer" class="movies-grid"></div>
            <div id="paginationArea" class="pagination-section" style="display: none;">
                <div class="page-circles" id="pageCircles"></div>
                <div class="page-nav-buttons">
                    <button class="page-nav" id="prevPageBtn">◀ 上一页</button>
                    <span id="pageIndicator" class="page-indicator">1/1</span>
                    <button class="page-nav" id="nextPageBtn">下一页 ▶</button>
                </div>
            </div>
        </div>

        <div id="searchResultView" style="display: none;">
            <div id="searchResultContainer" class="movies-grid"></div>
            <div id="searchResultPagination" class="pagination-section" style="display: none;">
                <div class="page-circles" id="searchPageCircles"></div>
                <div class="page-nav-buttons">
                    <button class="page-nav" id="searchPrevBtn">◀ 上一页</button>
                    <span id="searchPageIndicator" class="page-indicator">1/1</span>
                    <button class="page-nav" id="searchNextBtn">下一页 ▶</button>
                </div>
            </div>
        </div>

        <div id="episodeSelectorView" class="episode-selector">
            <div class="selector-header">
                <div class="selector-poster">
                    <img id="episodePoster" src="" alt="海报">
                </div>
                <div class="selector-info-area">
                    <div class="selector-title" id="episodeTitle"></div>
                </div>
                <button class="back-btn" id="backToSeriesBtn"><i class="fas fa-arrow-left"></i> 返回</button>
                <div id="seriesStamp" class="stamp" style="display: none;"></div>
            </div>
            <div class="episode-header">剧集选择：</div>
            <div class="episodes-grid" id="episodesGrid"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let allMovies = [];
    let allSeries = [];
    let filteredMovies = [];
    let filteredSeries = [];
    let currentPage = 1;
    let itemsPerPage = 15;
    let currentSearchKeyword = '';
    let currentSortMode = 'default';
    let currentView = 'movie';
    let historyRecords = [];
    let historyMap = {};
    let movieMap = {};
    let seriesMap = {};
    let seriesScrollPosition = 0;
    let currentSeries = null;
    let globalSearchResults = [];
    let globalSearchCurrentPage = 1;
    let globalSearchTotal = 0;
    let currentHistoryFilter = 'all';
    
    // 记录进入历史页之前的视图，用于返回
    let prevViewBeforeHistory = null;
    
    // 状态保存（用于从播放页返回时恢复）
    let savedScrollPosition = 0;
    let savedCurrentView = 'movie';
    let savedCurrentPage = 1;
    let savedCurrentSearchKeyword = '';
    let savedCurrentSortMode = 'default';
    let savedHistoryFilter = 'all';
    let savedEpisodeSelectorVisible = false;
    let savedCurrentSeries = null;
    let savedEpisodeGridHTML = '';
    let savedEpisodeTitle = '';
    let savedEpisodePoster = '';
    let savedSeriesStamp = '';

    const appContainer = document.getElementById('appContainer');
    const moviesContainer = document.getElementById('moviesContainer');
    const paginationArea = document.getElementById('paginationArea');
    const pageCirclesDiv = document.getElementById('pageCircles');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const searchSlide = document.getElementById('searchSlide');
    const searchToggleBtn = document.getElementById('searchToggleBtn');
    const searchInput = document.getElementById('searchInput');
    const searchConfirm = document.getElementById('searchConfirmBtn');
    const homeBtn = document.getElementById('homeBtn');
    const historyBtn = document.getElementById('historyBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const ratingBtn = document.querySelector('.rating-btn');
    const listView = document.getElementById('listView');
    const episodeSelectorView = document.getElementById('episodeSelectorView');
    const backToSeriesBtn = document.getElementById('backToSeriesBtn');
    const episodesGrid = document.getElementById('episodesGrid');
    const episodePoster = document.getElementById('episodePoster');
    const episodeTitle = document.getElementById('episodeTitle');
    const seriesStamp = document.getElementById('seriesStamp');
    const searchResultView = document.getElementById('searchResultView');
    const searchResultContainer = document.getElementById('searchResultContainer');
    const searchResultPagination = document.getElementById('searchResultPagination');
    const searchPageCircles = document.getElementById('searchPageCircles');
    const searchPrevBtn = document.getElementById('searchPrevBtn');
    const searchNextBtn = document.getElementById('searchNextBtn');
    const searchPageIndicator = document.getElementById('searchPageIndicator');
    const historyToolbar = document.getElementById('historyToolbar');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    // ----- 新增：显示历史页滚动提示（只显示一次）-----
    function showHistoryTip() {
        // 仅当在历史页且本次会话未显示过
        if (currentView !== 'history') return;
        if (sessionStorage.getItem('historyTipShown')) return;
        sessionStorage.setItem('historyTipShown', '1');
        
        const tipContainer = document.createElement('div');
        tipContainer.className = 'scroll-tip-container';
        tipContainer.innerHTML = '<div class="scroll-tip-text">✨ 可长按单个视频进行删除 ✨</div>';
        // 插入到 historyToolbar 后面
        const toolbar = document.getElementById('historyToolbar');
        if (toolbar && toolbar.parentNode) {
            toolbar.insertAdjacentElement('afterend', tipContainer);
            // 动画结束后移除元素
            const textDiv = tipContainer.querySelector('.scroll-tip-text');
            textDiv.addEventListener('animationend', function(e) {
                if (e.animationName === 'scrollTip') {
                    tipContainer.remove();
                }
            });
        }
    }
    
    // 修改 showLongPressMenu 确保菜单唯一性
    function showLongPressMenu(card) {
        // 移除所有其他卡片上的菜单
        document.querySelectorAll('.movie-card .longpress-menu').forEach(menu => menu.remove());
        // 如果当前卡片已有菜单，则不再添加（避免重复）
        if (card.querySelector('.longpress-menu')) return;
        
        let menu = document.createElement('div');
        menu.className = 'longpress-menu';
        menu.innerHTML = `<button class="delete-btn">删除</button><button class="cancel-btn">取消</button>`;
        card.style.position = 'relative';
        card.appendChild(menu);
        let deleteBtn = menu.querySelector('.delete-btn'), cancelBtn = menu.querySelector('.cancel-btn');
        deleteBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            let title = card.getAttribute('data-title');
            if (title && typeof iapp !== 'undefined' && iapp.fn) {
                iapp.fn(`history_manager.del("${title.replace(/"/g, '\\"')}")`);
                setTimeout(() => { loadHistoryFromIApp(); renderHistoryView(); }, 200);
            } else alert('无法连接到 iApp 或标题无效');
            menu.remove();
        });
        cancelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.remove();
        });
        let closeMenu = (e) => {
            if (!menu.contains(e.target)) {

    }

    // 从 localStorage 恢复状态（从播放页返回时调用）
    function restoreSavedState() {
        const scrollPos = localStorage.getItem('savedScrollPosition');
        const view = localStorage.getItem('savedCurrentView');
        const page = localStorage.getItem('savedCurrentPage');
        const kw = localStorage.getItem('savedCurrentSearchKeyword');
        const sort = localStorage.getItem('savedCurrentSortMode');
        const hFilter = localStorage.getItem('savedHistoryFilter');
        const epVisible = localStorage.getItem('savedEpisodeSelectorVisible');
        
        if (view && (view === 'movie' || view === 'tv' || view === 'history')) {
            currentView = view;
            if (page && !isNaN(parseInt(page))) currentPage = parseInt(page);
            if (kw) currentSearchKeyword = kw;
            if (sort === 'rating') currentSortMode = 'rating';
            if (hFilter && (hFilter === 'all' || hFilter === 'movie' || hFilter === 'series')) currentHistoryFilter = hFilter;
        } else {
            currentView = 'movie';
            currentPage = 1;
            currentSearchKeyword = '';
            currentSortMode = 'default';
            currentHistoryFilter = 'all';
        }
        
        if (currentView === 'movie') applyMovieFilterAndRender();
        else if (currentView === 'tv') applySeriesFilterAndRender();
        else if (currentView === 'history') {
            loadHistoryFromIApp();
            renderHistoryView();
            setHistoryFilter(currentHistoryFilter);
        }
        setActiveNavByView(currentView);
        
        if (epVisible === 'true') {
            const savedSeriesStr = localStorage.getItem('savedCurrentSeries');
            if (savedSeriesStr) {
                try {
                    savedCurrentSeries = JSON.parse(savedSeriesStr);
                    currentSeries = savedCurrentSeries;
                    episodeTitle.textContent = localStorage.getItem('savedEpisodeTitle') || '';
                    episodePoster.src = localStorage.getItem('savedEpisodePoster') || '';
                    const stampText = localStorage.getItem('savedSeriesStamp');
                    if (stampText) {
                        seriesStamp.textContent = stampText;
                        seriesStamp.style.display = 'flex';
                    } else {
                        seriesStamp.style.display = 'none';
                    }
                    episodesGrid.innerHTML = localStorage.getItem('savedEpisodeGridHTML') || '';
                    refreshEpisodeHighlight();
                    listView.style.display = 'none';
                    episodeSelectorView.classList.add('active');
                    if (historyToolbar) historyToolbar.style.display = 'none';
                } catch(e) { console.error('恢复剧集选择器失败', e); }
            }
        }
        
        if (scrollPos && !isNaN(parseInt(scrollPos))) {
            setTimeout(() => appContainer.scrollTo({ top: parseInt(scrollPos), behavior: 'auto' }), 100);
        }
        
        setTimeout(() => {
            localStorage.removeItem('savedScrollPosition');
            localStorage.removeItem('savedCurrentView');
            localStorage.removeItem('savedCurrentPage');
            localStorage.removeItem('savedCurrentSearchKeyword');
            localStorage.removeItem('savedCurrentSortMode');
            localStorage.removeItem('savedHistoryFilter');
            localStorage.removeItem('savedEpisodeSelectorVisible');
            localStorage.removeItem('savedCurrentSeries');
            localStorage.removeItem('savedEpisodeTitle');
            localStorage.removeItem('savedEpisodePoster');
            localStorage.removeItem('savedSeriesStamp');
            localStorage.removeItem('savedEpisodeGridHTML');
        }, 1000);
    }

    function formatTime(seconds) { if (isNaN(seconds)) return '00:00:00'; let hrs = Math.floor(seconds / 3600), mins = Math.floor((seconds % 3600) / 60), secs = Math.floor(seconds % 60); if (hrs > 0) return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; }
    function extractPlayUrls(movie) { let lines = []; let urlKeys = Object.keys(movie).filter(k => k.startsWith('url')).sort((a,b) => parseInt(a.replace('url','')||0) - parseInt(b.replace('url','')||0)); urlKeys.forEach((key, idx) => { let raw = movie[key]; if (!raw || typeof raw !== 'string') return; raw = raw.trim(); let note = ''; let cleanUrl = raw; let bracketMatch = raw.match(/\(([^)]+)\)[^)]*$/); if (bracketMatch) { note = bracketMatch[1]; cleanUrl = raw.replace(/\s*\([^)]*\)\s*$/, '').trim(); } if (cleanUrl) lines.push({ name: `线路${idx+1}`, url: cleanUrl, note: note || '' }); }); return lines; }
    
    function goToPlayer(movie, resumeLine = null, resumeTime = null, jsitem = null, scaleObj = null, imageObj = null, isSeries = false, seriesPath = null) {
        let lines = extractPlayUrls(movie);
        if (lines.length === 0) { alert('暂无可用播放地址'); return; }
        let title = movie.name, poster = movie.img || '';
        let linesPayload = lines.map(line => ({ name: line.name, url: line.url, note: line.note }));
        let query = new URLSearchParams();
        query.set('title', title);
        query.set('poster', poster);
        query.set('lines', JSON.stringify(linesPayload));
        query.set('src', lines[0].url);
        if (resumeLine !== null && resumeTime !== null) {
            query.set('resumeLine', resumeLine);
            query.set('resumeTime', resumeTime);
            if (jsitem !== null) query.set('jsitem', jsitem);
            if (scaleObj) {
                if (scaleObj.scale !== undefined) query.set('scale', scaleObj.scale);
                if (scaleObj.width !== undefined) query.set('width', scaleObj.width);
                if (scaleObj.height !== undefined) query.set('height', scaleObj.height);
                if (scaleObj.top !== undefined) query.set('top', scaleObj.top);
            }
            if (imageObj) {
                if (imageObj.brightness !== undefined) query.set('brightness', imageObj.brightness);
                if (imageObj.contrast !== undefined) query.set('contrast', imageObj.contrast);
                if (imageObj.saturate !== undefined) query.set('saturate', imageObj.saturate);
                if (imageObj.hue !== undefined) query.set('hue', imageObj.hue);
            }
        } else if (historyMap[title]) {
            let record = historyMap[title];
            query.set('resumeLine', record.lineIndex);
            query.set('resumeTime', record.time);
            if (record.jsitem !== undefined) query.set('jsitem', record.jsitem);
            if (record.scale !== undefined) query.set('scale', record.scale);
            if (record.width !== undefined) query.set('width', record.width);
            if (record.height !== undefined) query.set('height', record.height);
            if (record.top !== undefined) query.set('top', record.top);
            if (record.brightness !== undefined) query.set('brightness', record.brightness);
            if (record.contrast !== undefined) query.set('contrast', record.contrast);
            if (record.saturate !== undefined) query.set('saturate', record.saturate);
            if (record.hue !== undefined) query.set('hue', record.hue);
        }
        if (isSeries && seriesPath) {
            query.set('seriesPath', seriesPath);
            query.set('isSeries', '1');
        }
        window.location.href = `play.html?${query.toString()}`;
    }

                for (let k in scaleObj) if (isNaN(scaleObj[k])) delete scaleObj[k]; 
                for (let k in imageObj) if (isNaN(imageObj[k])) delete imageObj[k]; 
                if (type === 'movie') { let movieData = movieMap[title]; if (movieData) goToPlayerAndSave(movieData, lineIndex, time, jsitem, scaleObj, imageObj, false); else alert('影片信息缺失'); } 
                else if (type === 'series') { let seriesData = seriesMap[title]; if (seriesData) await playSeriesFromHistory(seriesData, lineIndex, time, jsitem, scaleObj, imageObj); else alert('剧集信息缺失'); } 
            }); 
            let longPressTimer = null; 
            card.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => showLongPressMenu(card), 500); }); 
            card.addEventListener('touchend', () => { if (longPressTimer) clearTimeout(longPressTimer); }); 
            card.addEventListener('touchmove', () => { if (longPressTimer) clearTimeout(longPressTimer); }); 
            card.addEventListener('mousedown', (e) => { longPressTimer = setTimeout(() => showLongPressMenu(card), 500); }); 
            card.addEventListener('mouseup', () => { if (longPressTimer) clearTimeout(longPressTimer); }); 
            card.addEventListener('mouseleave', () => { if (longPressTimer) clearTimeout(longPressTimer); }); 
        }); 
        setTimeout(() => updateItemsPerPage(), 20);
        // 显示一次性提示（仅当第一次进入历史页）
        showHistoryTip();
    }
    
    function setHistoryFilter(filter) { currentHistoryFilter = filter; document.querySelectorAll('.history-filter-btn').forEach(btn => { if (btn.getAttribute('data-filter') === filter) btn.classList.add('active'); else btn.classList.remove('active'); }); renderHistoryView(); }
    function performGlobalSearch() { let kw = searchInput.value.trim(); if(kw === ''){ clearGlobalSearch(); return; } currentSearchKeyword = kw; let movieResults = allMovies.filter(m=>m.name && m.name.toLowerCase().includes(kw.toLowerCase())); let seriesResults = allSeries.filter(s=>s.pureName && s.pureName.toLowerCase().includes(kw.toLowerCase())); globalSearchResults = [...movieResults.map(m=>({type:'movie',data:m})), ...seriesResults.map(s=>({type:'series',data:s}))]; globalSearchTotal = globalSearchResults.length; globalSearchCurrentPage = 1; renderGlobalSearch(); listView.style.display = 'none'; episodeSelectorView.classList.remove('active'); searchResultView.style.display = 'block'; if(historyToolbar) historyToolbar.style.display = 'none'; scrollToTop(); }
    function renderGlobalSearch() { let start=(globalSearchCurrentPage-1)*itemsPerPage,end=start+itemsPerPage,pageItems=globalSearchResults.slice(start,end); if(!pageItems.length){ searchResultContainer.innerHTML='<div class="empty-msg">🔍 没有找到相关影片或连续剧</div>'; searchResultPagination.style.display='none'; return; } let html=''; for(let item of pageItems){ let data=item.data, posterUrl=data.img||'https://placehold.co/300x450?text=No+Poster', rating=data.pf?parseFloat(data.pf).toFixed(1):'暂无', title=item.type==='movie'?data.name:data.pureName, typeLabel=item.type==='movie'?'电影':'连续剧', typeClass=item.type==='movie'?'movie':'series'; html+=`<div class="movie-card" data-search-item='${JSON.stringify(item)}'><div class="poster"><img src="${posterUrl}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Error'"><div class="rating"><i class="fas fa-star"></i> ${rating}</div><div class="type-badge ${typeClass}">${typeLabel}</div></div><div class="movie-info"><div class="movie-title">${escapeHtml(title)}</div></div></div>`; } searchResultContainer.innerHTML=html; document.querySelectorAll('[data-search-item]').forEach(card=>{ card.addEventListener('click',()=>{ let item=JSON.parse(card.getAttribute('data-search-item')); if(item.type==='movie') goToPlayerAndSave(item.data); else { saveSeriesScrollPosition(); showEpisodeSelector(item.data); } }); }); let totalPages=Math.ceil(globalSearchTotal/itemsPerPage); if(totalPages<=1)searchResultPagination.style.display='none'; else { searchResultPagination.style.display='flex'; searchPageIndicator.textContent = `${globalSearchCurrentPage}/${totalPages}`; let circlesHtml=''; for(let i=1;i<=totalPages;i++)circlesHtml+=`<div class="page-circle ${i===globalSearchCurrentPage?'active-page':''}" data-page="${i}">${i}</div>`; searchPageCircles.innerHTML=circlesHtml; document.querySelectorAll('#searchPageCircles .page-circle').forEach(c=>c.addEventListener('click',()=>{let p=parseInt(c.getAttribute('data-page')); if(p&&p!==globalSearchCurrentPage){ globalSearchCurrentPage=p; renderGlobalSearch(); }})); searchPrevBtn.classList.toggle('disabled',globalSearchCurrentPage===1); searchNextBtn.classList.toggle('disabled',globalSearchCurrentPage===totalPages); } setTimeout(() => updateItemsPerPage(), 20); }
    function clearGlobalSearch(){ searchInput.value=''; currentSearchKeyword=''; globalSearchResults=[]; if (currentView === 'movie') { listView.style.display = 'block'; searchResultView.style.display = 'none'; applyMovieFilterAndRender(); } else if (currentView === 'tv') { listView.style.display = 'block'; searchResultView.style.display = 'none'; applySeriesFilterAndRender(); } else if (currentView === 'history') { listView.style.display = 'block'; searchResultView.style.display = 'none'; renderHistoryView(); } else { listView.style.display = 'block'; searchResultView.style.display = 'none'; } searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); scrollToTop(); }
    function renderPagination(totalItems) { if(currentView==='history') return; let totalPages=Math.ceil(totalItems/itemsPerPage); if(totalPages<=1){ pageCirclesDiv.innerHTML=''; pageIndicator.textContent = '1/1'; return; } pageIndicator.textContent = `${currentPage}/${totalPages}`; let circlesHtml=''; for(let i=1;i<=totalPages;i++)circlesHtml+=`<div class="page-circle ${i===currentPage?'active-page':''}" data-page="${i}">${i}</div>`; pageCirclesDiv.innerHTML=circlesHtml; document.querySelectorAll('#pageCircles .page-circle').forEach(circle=>{circle.addEventListener('click',()=>{let page=parseInt(circle.getAttribute('data-page')); if(!isNaN(page)&&page!==currentPage){ currentPage=page; if(currentView==='movie')renderMovieList(); else renderSeriesList(); renderPagination(currentView==='movie'?filteredMovies.length:filteredSeries.length); scrollToTop(); }});}); prevBtn.classList.toggle('disabled',currentPage===1); nextBtn.classList.toggle('disabled',currentPage===totalPages); }
    function goPrevPage(){ let total=Math.ceil((currentView==='movie'?filteredMovies.length:filteredSeries.length)/itemsPerPage); if(currentPage>1){ currentPage--; if(currentView==='movie')renderMovieList(); else renderSeriesList(); renderPagination(currentView==='movie'?filteredMovies.length:filteredSeries.length); scrollToTop(); } }
    function goNextPage(){ let total=Math.ceil((currentView==='movie'?filteredMovies.length:filteredSeries.length)/itemsPerPage); if(currentPage<total){ currentPage++; if(currentView==='movie')renderMovieList(); else renderSeriesList(); renderPagination(currentView==='movie'?filteredMovies.length:filteredSeries.length); scrollToTop(); } }
    function switchToTVView() { if (episodeSelectorView.classList.contains('active')) hideEpisodeSelector(); if (searchResultView.style.display === 'block') clearGlobalSearch(); if (currentView === 'tv') { scrollToTop(); return; } currentView = 'tv'; listView.classList.remove('history-active'); hideEpisodeSelector(); clearGlobalSearch(); currentSearchKeyword = ''; searchInput.value = ''; searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); currentSortMode = 'default'; applySeriesFilterAndRender(); paginationArea.style.display = 'flex'; setActiveNavByView('tv'); scrollToTop(); }
    function switchToMovieView(){ if (episodeSelectorView.classList.contains('active')) hideEpisodeSelector(); if (searchResultView.style.display === 'block') clearGlobalSearch(); if(currentView==='movie'){ scrollToTop(); return; } currentView='movie'; listView.classList.remove('history-active'); hideEpisodeSelector(); clearGlobalSearch(); currentSearchKeyword=''; searchInput.value=''; searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); currentSortMode='default'; applyMovieFilterAndRender(); paginationArea.style.display='flex'; setActiveNavByView('movie'); scrollToTop(); }
    function switchToRatingView(){ if(currentView!=='movie'&&currentView!=='tv') return; currentSortMode=currentSortMode==='rating'?'default':'rating'; if(currentView==='movie') applyMovieFilterAndRender(); else applySeriesFilterAndRender(); if(ratingBtn) ratingBtn.classList.toggle('active',currentSortMode==='rating'); scrollToTop(); }
    function switchToHistoryView(){ 
        if (currentView !== 'history') {
            prevViewBeforeHistory = currentView;
        }
        if(currentView==='history'){ scrollToTop(); return; } 
        currentView='history'; 
        listView.classList.add('history-active'); 
        hideEpisodeSelector(); 
        clearGlobalSearch(); 
        currentSearchKeyword=''; 
        searchInput.value=''; 
        searchSlide.classList.remove('open'); 
        updateSearchToggleButtonText(false); 
        loadHistoryFromIApp(); 
        renderHistoryView(); 
        paginationArea.style.display='none'; 
        setActiveNavByView('history'); 
        scrollToTop(); 
    }
    function setActiveNavByView(view){ document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active')); if(view==='movie') document.querySelector('[data-view="movie"]')?.classList.add('active'); else if(view==='tv') document.querySelector('[data-view="tv"]')?.classList.add('active'); else if(view==='history') historyBtn.classList.add('active'); if(ratingBtn){ if((currentView==='movie'||currentView==='tv')&&currentSortMode==='rating') ratingBtn.classList.add('active'); else ratingBtn.classList.remove('active'); } if (view === 'history') { if(historyToolbar) historyToolbar.style.display = 'flex'; } else { if(historyToolbar) historyToolbar.style.display = 'none'; } }
    function updateSearchToggleButtonText(isOpen){ if(isOpen){ searchToggleBtn.innerHTML='<i class="fas fa-times"></i> 取消'; searchToggleBtn.classList.add('active'); }else{ searchToggleBtn.innerHTML='<i class="fas fa-search"></i> 搜索'; searchToggleBtn.classList.remove('active'); } }
    function closeSearch(){ if(searchSlide.classList.contains('open')){ searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); } }
    function openSearch(){ if(!searchSlide.classList.contains('open')){ searchSlide.classList.add('open'); updateSearchToggleButtonText(true); searchInput.focus(); } }
    if (clearHistoryBtn) clearHistoryBtn.addEventListener('click', () => { if (currentView !== 'history') return; if (confirm('确定要清除所有观看记录吗？此操作不可恢复。')) { if (typeof iapp !== 'undefined' && iapp.fn) { iapp.fn('history_manager.clear("1")'); if (typeof tw === 'function') tw("正在清除观看记录..."); setTimeout(() => { loadHistoryFromIApp(); renderHistoryView(); if (historyRecords.length === 0) moviesContainer.innerHTML = '<div class="empty-msg">📭 没有播放记录。</div>'; }, 500); } else alert("无法连接到 iApp 环境"); } });
    function initHistoryFilters() { document.querySelectorAll('.history-filter-btn').forEach(btn => { btn.addEventListener('click', () => { let filter = btn.getAttribute('data-filter'); if (filter) setHistoryFilter(filter); }); }); }
    
    // 后退信号处理（保持不变）
    let pendingBack = false;
    window.quitSignal = null;
    Object.defineProperty(window, 'quitSignal', {
        set: function(value) {
            if (value !== 1) return;
            if (pendingBack) return;
            pendingBack = true;
            setTimeout(() => {
                try {
                    if (episodeSelectorView.classList.contains('active')) {
                        hideEpisodeSelector();
                        pendingBack = false;
                        return;
                    }
                    if (searchResultView.style.display === 'block') {
                        clearGlobalSearch();
                        pendingBack = false;
                        return;
                    }
                    if (currentView === 'history') {
                        if (prevViewBeforeHistory === 'movie') {
                            switchToMovieView();
                        } else if (prevViewBeforeHistory === 'tv') {
                            switchToTVView();
                        } else {
                            switchToMovieView();
                        }
                        prevViewBeforeHistory = null;
                        pendingBack = false;
                        return;
                    }
                    if (typeof iapp !== 'undefined' && iapp.s) {
                        iapp.s('sss.exit', 'exit');
                    }
                } catch (e) {
                    console.error('[后退] 处理异常:', e);
                } finally {
                    pendingBack = false;
                }
            }, 10);
        },
        get: function() { return null; }
    });
    
    function initButtons(){ document.querySelector('[data-view="movie"]')?.addEventListener('click', switchToMovieView); document.querySelector('[data-view="tv"]')?.addEventListener('click', switchToTVView); ratingBtn?.addEventListener('click', switchToRatingView); refreshBtn?.addEventListener('click', async () => { await loadAllData(); if(currentView==='movie') applyMovieFilterAndRender(); else if(currentView==='tv') applySeriesFilterAndRender(); else if(currentView==='history'){ loadHistoryFromIApp(); renderHistoryView(); } scrollToTop(); }); homeBtn?.addEventListener('click', switchToMovieView); historyBtn?.addEventListener('click', switchToHistoryView); backToSeriesBtn?.addEventListener('click', hideEpisodeSelector); searchToggleBtn.addEventListener('click',(e)=>{ e.stopPropagation(); searchSlide.classList.contains('open')?closeSearch():openSearch(); }); searchConfirm.addEventListener('click',()=>{ if(currentView==='history'){ currentSearchKeyword=searchInput.value.trim(); renderHistoryView(); closeSearch(); }else{ performGlobalSearch(); closeSearch(); } }); searchInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter'){ if(currentView==='history'){ currentSearchKeyword=searchInput.value.trim(); renderHistoryView(); closeSearch(); }else{ performGlobalSearch(); closeSearch(); } } }); prevBtn.addEventListener('click',goPrevPage); nextBtn.addEventListener('click',goNextPage); searchPrevBtn.addEventListener('click',()=>{ if(globalSearchCurrentPage>1){ globalSearchCurrentPage--; renderGlobalSearch(); } }); searchNextBtn.addEventListener('click',()=>{ let totalPages=Math.ceil(globalSearchTotal/itemsPerPage); if(globalSearchCurrentPage<totalPages){ globalSearchCurrentPage++; renderGlobalSearch(); } }); initHistoryFilters(); }
    
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            if (currentView === 'history') {
                loadHistoryFromIApp();
                renderHistoryView();
                setHistoryFilter(currentHistoryFilter);
            } else if (episodeSelectorView.classList.contains('active') && currentSeries) {
                loadHistoryFromIApp();
                refreshEpisodeHighlight();
            }
        }
    });
    
    async function init() {
        loadHistoryFromIApp();
        await loadAllData();
        initButtons();
        restoreSavedState();
        scrollToTop();
    }
    init();
</script>
