<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的影院 - 在线影视</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg-primary: #0a0e12; --bg-secondary: #1a1e24; --card-bg: #14181f; --text-primary: #ffffff; --text-secondary: #cceeff; --accent-color: #ff5722; --border-color: #2a2e35; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; z-index: 0; }
        .app-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100000000; background: var(--bg-primary); overflow-y: auto; padding: 0 20px 40px 20px; display: flex; flex-direction: column; }
        .content-wrapper { max-width: 1600px; width: 100%; margin: 0 auto; flex: 1; }
        .header-sticky { position: sticky; top: 0; background: rgba(10,14,18,0.92); backdrop-filter: blur(12px); z-index: 100; padding: 16px 0 12px 0; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); }
        .title-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .site-title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff, var(--accent-color)); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 1px; }
        .title-right-buttons { display: flex; gap: 12px; }
        .title-right-buttons .nav-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
        .nav-scroll { overflow-x: auto; overflow-y: hidden; white-space: nowrap; scrollbar-width: thin; -webkit-overflow-scrolling: touch; display: flex; gap: 8px; padding-bottom: 6px; justify-content: flex-end; scrollbar-width: none; -ms-overflow-style: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .nav-btn i { font-size: 16px; }
        .nav-btn:active, .movie-card:active, .episode-btn:active, .page-circle:active, .page-nav:active, .back-btn:active { transform: none; background: inherit; opacity: 0.8; }
        .movie-card:active { transform: none; }
        .nav-btn.active { background: var(--accent-color); color: white; box-shadow: 0 2px 8px rgba(255,87,34,0.4); }
        .search-icon-btn { background: var(--bg-secondary); color: var(--text-secondary); }
        .search-slide { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; margin-top: 8px; }
        .search-slide.open { max-height: 80px; }
        .search-box { background: var(--bg-secondary); border-radius: 48px; padding: 4px 16px; display: flex; align-items: center; border: 1px solid var(--border-color); }
        .search-box input { flex: 1; background: transparent; border: none; padding: 8px 0; color: white; font-size: 15px; outline: none; }
        .search-box input::placeholder { color: #8e9aaf; }
        .search-box button { background: var(--accent-color); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: opacity 0.2s; }
        /* 隐藏所有列表滚动条 */
        .movies-grid, .episodes-grid, .recommend-scroll, .episode-list-outer { scrollbar-width: none; -ms-overflow-style: none; }
        .movies-grid::-webkit-scrollbar, .episodes-grid::-webkit-scrollbar, .recommend-scroll::-webkit-scrollbar, .episode-list-outer::-webkit-scrollbar { display: none; }
        .movies-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); margin-top: 12px; margin-bottom: 40px; }
        .movie-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; transition: box-shadow 0.2s; cursor: pointer; position: relative; box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .movie-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .poster { position: relative; aspect-ratio: 2 / 3; background: #0f1117; overflow: hidden; }
        .poster img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.25s; }
        .movie-card:hover .poster img { transform: scale(1.03); }
        .rating { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #ffc107; border-left: 2px solid var(--accent-color); z-index: 2; }
        .rating i { font-size: 10px; margin-right: 3px; color: #ffb347; }
        .type-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; z-index: 2; display: none; pointer-events: none; }
        .type-badge.movie { background: rgba(255,87,34,0.95); }
        .type-badge.series { background: rgba(33,150,243,0.95); }
        #searchResultView .type-badge, #listView.history-active .type-badge { display: inline-block; }
        .series-note { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #ffdbca; font-family: monospace; z-index: 2; }
        .movie-info { padding: 12px 10px; position: relative; }
        .movie-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f0f0f0; }
        /* 历史记录卡片中的进度信息区域，可容纳两行 */
        .play-progress { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; color: #ffdbca; font-family: monospace; z-index: 2; white-space: nowrap; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; line-height: 1.2; }
        .play-progress span { font-size: 10px; color: #ffaa88; }
        .pagination-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .page-circles { display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 4px; max-width: 100%; justify-content: center; flex-wrap: nowrap; scrollbar-width: none; -ms-overflow-style: none; }
        .page-circles::-webkit-scrollbar { display: none; }
        .page-circle { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); border-radius: 50%; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: 1px solid var(--border-color); color: var(--text-secondary); }
        .page-circle.active-page { background: var(--accent-color); color: white; box-shadow: 0 0 10px var(--accent-color); transform: none; border-color: var(--accent-color); }
        .page-nav-buttons { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .page-nav { background: var(--bg-secondary); border: none; padding: 8px 24px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; transition: opacity 0.2s; font-size: 14px; }
        .page-nav.disabled { opacity: 0.4; pointer-events: none; }
        .page-nav:active { opacity: 0.7; transform: none; }
        .page-indicator { font-size: 15px; font-weight: 500; color: var(--text-secondary); background: var(--bg-secondary); padding: 4px 12px; border-radius: 30px; min-width: 70px; text-align: center; }
        .empty-msg { text-align: center; padding: 60px; color: #aaa; font-size: 18px; }
        /* 历史页工具栏 - 固定在顶部不随列表滚动 */
        .history-toolbar { position: sticky; top: 90px; z-index: 50; display: flex; justify-content: flex-end; margin: 0 0 16px 0; padding: 0; background: rgba(10,14,18,0.9); backdrop-filter: blur(8px); border-radius: 40px; pointer-events: auto; gap: 12px; width: fit-content; margin-left: auto; padding: 6px 12px; }
        .history-filter-btn { background: var(--bg-secondary); border: none; color: var(--text-secondary); font-size: 13px; padding: 4px 12px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .history-filter-btn.active { background: var(--accent-color); color: white; }
        .clear-history-btn { background: rgba(30,30,40,0.9); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 14px; padding: 4px 12px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .clear-history-btn:active { opacity: 0.7; background: var(--accent-color); color: white; transform: none; }
        /* 长按弹出菜单样式 */
        .longpress-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); border-radius: 40px; display: flex; gap: 20px; padding: 12px 24px; z-index: 1000; border: 1px solid var(--accent-color); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .longpress-menu button { background: var(--accent-color); border: none; color: white; padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .longpress-menu button:last-child { background: #444; }
        .episode-selector { display: none; animation: fadeIn 0.2s ease; }
        .episode-selector.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .selector-header { position: relative; display: flex; gap: 20px; margin-bottom: 20px; background: var(--bg-secondary); border-radius: 20px; padding: 16px; align-items: flex-end; }
        .selector-poster { width: 120px; flex-shrink: 0; }
        .selector-poster img { width: 100%; border-radius: 12px; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .selector-info-area { flex: 1; min-width: 0; }
        .selector-title { font-size: 22px; font-weight: bold; color: #fff; line-height: 1.35; word-break: break-word; white-space: normal; overflow: visible; }
        .back-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 15px; padding: 8px 16px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: opacity 0.2s; backdrop-filter: blur(4px); z-index: 5; white-space: nowrap; }
        .back-btn i { font-size: 14px; }
        .back-btn:active { opacity: 0.7; transform: none; background: rgba(255,255,255,0.15); }
        .stamp { position: absolute; left: 140px; top: 70px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid #ff5722; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #ff5722; text-align: center; backdrop-filter: blur(2px); box-shadow: 0 0 0 1px rgba(255,87,34,0.3), inset 0 0 0 1px rgba(255,87,34,0.2); transform: rotate(-5deg); z-index: 6; pointer-events: none; font-family: "KaiTi", "楷体", "STKaiti", serif; letter-spacing: 1px; }
        @media (max-width: 640px) {
            .selector-header { gap: 12px; padding: 12px; align-items: flex-end; }
            .selector-poster { width: 90px; }
            .selector-title { font-size: 18px; }
            .back-btn { padding: 6px 12px; font-size: 13px; top: 12px; right: 12px; }
            .stamp { left: 110px; width: 50px; height: 50px; font-size: 12px; top: 55px; }
            .history-toolbar { top: 80px; }
            .history-filter-btn { font-size: 11px; padding: 2px 10px; }
            .clear-history-btn { font-size: 12px; padding: 2px 10px; }
        }
        .episode-header { margin: 15px 0 12px 0; padding-left: 8px; font-size: 16px; font-weight: 600; color: var(--accent-color); letter-spacing: 1px; border-left: 3px solid var(--accent-color); }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, auto)); gap: 12px; margin-top: 5px; max-height: 60vh; overflow-y: auto; padding: 8px 4px; }
        .episode-btn { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 0; text-align: center; cursor: pointer; transition: all 0.2s ease; font-size: 16px; font-weight: 500; color: var(--text-secondary); position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .episode-btn.highlight { background: var(--accent-color); color: white; border-color: #ff784e; box-shadow: 0 0 0 0 rgba(255,87,34,0.6); animation: strong-breathe 1s infinite ease-in-out; font-weight: bold; }
        .episode-btn.highlight i { margin-right: 6px; font-size: 14px; }
        @keyframes strong-breathe { 0% { box-shadow: 0 0 0 0 rgba(255,87,34,0.8); transform: scale(1); } 50% { box-shadow: 0 0 0 10px rgba(255,87,34,0); transform: scale(1.02); background: #ff6a3a; } 100% { box-shadow: 0 0 0 0 rgba(255,87,34,0); transform: scale(1); } }
        .episode-btn:active { opacity: 0.7; transform: none; background: var(--accent-color); color: white; }
        footer { display: none; }
        @media (max-width: 640px) { .movies-grid { gap: 14px; } .site-title { font-size: 22px; } .nav-btn { padding: 6px 12px; font-size: 13px; } .title-right-buttons .nav-btn { padding: 6px 12px; font-size: 13px; } }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="content-wrapper">
        <div class="header-sticky">
            <div class="title-bar">
                <div class="site-title">我的影院</div>
                <div class="title-right-buttons">
                    <button class="nav-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
                    <button class="nav-btn" id="homeBtn"><i class="fas fa-home"></i> 首页</button>
                </div>
            </div>
            <div class="nav-scroll" id="navScroll">
                <button class="nav-btn active" data-view="movie">电影</button>
                <button class="nav-btn" data-view="tv">连续剧</button>
                <button class="nav-btn rating-btn" data-view="rating">按评分</button>
                <button class="nav-btn" id="historyBtn">历史</button>
                <button class="nav-btn search-icon-btn" id="searchToggleBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>
            <div class="search-slide" id="searchSlide">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="请输入片名..." autocomplete="off">
                    <button id="searchConfirmBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>

        <div id="listView">
            <div id="historyToolbar" class="history-toolbar" style="display: none;">
                <button class="clear-history-btn" id="clearHistoryBtn">清除观看记录</button>
                <button class="history-filter-btn" data-filter="series">连续剧</button>
                <button class="history-filter-btn" data-filter="movie">电影</button>
                <button class="history-filter-btn active" data-filter="all">全部</button>
            </div>
            <div id="moviesContainer" class="movies-grid"></div>
            <div id="paginationArea" class="pagination-section" style="display: none;">
                <div class="page-circles" id="pageCircles"></div>
                <div class="page-nav-buttons">
                    <button class="page-nav" id="prevPageBtn">◀ 上一页</button>
                    <span id="pageIndicator" class="page-indicator">1/1</span>
                    <button class="page-nav" id="nextPageBtn">下一页 ▶</button>
                </div>
            </div>
        </div>

        <div id="searchResultView" style="display: none;">
            <div id="searchResultContainer" class="movies-grid"></div>
            <div id="searchResultPagination" class="pagination-section" style="display: none;">
                <div class="page-circles" id="searchPageCircles"></div>
                <div class="page-nav-buttons">
                    <button class="page-nav" id="searchPrevBtn">◀ 上一页</button>
                    <span id="searchPageIndicator" class="page-indicator">1/1</span>
                    <button class="page-nav" id="searchNextBtn">下一页 ▶</button>
                </div>
            </div>
            <!-- 移除清除搜索按钮 -->
        </div>

        <div id="episodeSelectorView" class="episode-selector">
            <div class="selector-header">
                <div class="selector-poster">
                    <img id="episodePoster" src="" alt="海报">
                </div>
                <div class="selector-info-area">
                    <div class="selector-title" id="episodeTitle"></div>
                </div>
                <button class="back-btn" id="backToSeriesBtn"><i class="fas fa-arrow-left"></i> 返回</button>
                <div id="seriesStamp" class="stamp" style="display: none;"></div>
            </div>
            <div class="episode-header">剧集选择：</div>
            <div class="episodes-grid" id="episodesGrid"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let allMovies = [];
    let allSeries = [];
    let filteredMovies = [];
    let filteredSeries = [];
    let currentPage = 1;
    let itemsPerPage = 15;
    let currentSearchKeyword = '';
    let currentSortMode = 'default';
    let currentView = 'movie';
    let historyRecords = [];
    let historyMap = {};
    let movieMap = {};
    let seriesMap = {};
    let seriesScrollPosition = 0;
    let currentSeries = null;
    let globalSearchResults = [];
    let globalSearchCurrentPage = 1;
    let globalSearchTotal = 0;
    let currentHistoryFilter = 'all'; // 'all', 'movie', 'series'

    const appContainer = document.getElementById('appContainer');
    const moviesContainer = document.getElementById('moviesContainer');
    const paginationArea = document.getElementById('paginationArea');
    const pageCirclesDiv = document.getElementById('pageCircles');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const searchSlide = document.getElementById('searchSlide');
    const searchToggleBtn = document.getElementById('searchToggleBtn');
    const searchInput = document.getElementById('searchInput');
    const searchConfirm = document.getElementById('searchConfirmBtn');
    const homeBtn = document.getElementById('homeBtn');
    const historyBtn = document.getElementById('historyBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const ratingBtn = document.querySelector('.rating-btn');
    const listView = document.getElementById('listView');
    const episodeSelectorView = document.getElementById('episodeSelectorView');
    const backToSeriesBtn = document.getElementById('backToSeriesBtn');
    const episodesGrid = document.getElementById('episodesGrid');
    const episodePoster = document.getElementById('episodePoster');
    const episodeTitle = document.getElementById('episodeTitle');
    const seriesStamp = document.getElementById('seriesStamp');
    const searchResultView = document.getElementById('searchResultView');
    const searchResultContainer = document.getElementById('searchResultContainer');
    const searchResultPagination = document.getElementById('searchResultPagination');
    const searchPageCircles = document.getElementById('searchPageCircles');
    const searchPrevBtn = document.getElementById('searchPrevBtn');
    const searchNextBtn = document.getElementById('searchNextBtn');
    const searchPageIndicator = document.getElementById('searchPageIndicator');
    const historyToolbar = document.getElementById('historyToolbar');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    // 辅助函数
    function getGridColumnCount() {
        let gridElement = document.querySelector('.movies-grid');
        if (!gridElement) return 3;
        const style = getComputedStyle(gridElement);
        const templateColumns = style.gridTemplateColumns;
        if (!templateColumns || templateColumns === 'none') return 3;
        return templateColumns.split(' ').length;
    }

    function updateItemsPerPage() {
        const colCount = getGridColumnCount();
        const newPerPage = (colCount % 2 === 0) ? 16 : 15;
        if (itemsPerPage !== newPerPage) {
            itemsPerPage = newPerPage;
            currentPage = 1;
            if (currentView === 'movie') applyMovieFilterAndRender();
            else if (currentView === 'tv') applySeriesFilterAndRender();
            else if (currentView === 'history') renderHistoryView();
            if (searchResultView.style.display === 'block') renderGlobalSearch();
        }
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => updateItemsPerPage(), 150);
    });

    function scrollToTop() { if (appContainer) appContainer.scrollTo({ top: 0, behavior: 'smooth' }); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function formatTime(seconds) {
        if (isNaN(seconds)) return '00:00:00';
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function extractPlayUrls(movie) {
        const lines = [];
        const urlKeys = Object.keys(movie).filter(k => k.startsWith('url')).sort((a,b) => parseInt(a.replace('url','')||0) - parseInt(b.replace('url','')||0));
        urlKeys.forEach((key, idx) => {
            let raw = movie[key];
            if (!raw || typeof raw !== 'string') return;
            raw = raw.trim();
            let note = '';
            let cleanUrl = raw;
            const bracketMatch = raw.match(/\(([^)]+)\)[^)]*$/);
            if (bracketMatch) { note = bracketMatch[1]; cleanUrl = raw.replace(/\s*\([^)]*\)\s*$/, '').trim(); }
            if (cleanUrl) lines.push({ name: `线路${idx+1}`, url: cleanUrl, note: note || '' });
        });
        return lines;
    }

    function goToPlayer(movie, resumeLine = null, resumeTime = null, jsitem = null, scaleObj = null, imageObj = null, isSeries = false, seriesPath = null) {
        const lines = extractPlayUrls(movie);
        if (lines.length === 0) { alert('暂无可用播放地址'); return; }
        const title = movie.name;
        const poster = movie.img || '';
        const linesPayload = lines.map(line => ({ name: line.name, url: line.url, note: line.note }));
        const query = new URLSearchParams();
        query.set('title', title);
        query.set('poster', poster);
        query.set('lines', JSON.stringify(linesPayload));
        query.set('src', lines[0].url);
        if (resumeLine !== null && resumeTime !== null) {
            query.set('resumeLine', resumeLine);
            query.set('resumeTime', resumeTime);
            if (jsitem !== null) query.set('jsitem', jsitem);
            if (scaleObj) {
                if (scaleObj.scale !== undefined) query.set('scale', scaleObj.scale);
                if (scaleObj.width !== undefined) query.set('width', scaleObj.width);
                if (scaleObj.height !== undefined) query.set('height', scaleObj.height);
                if (scaleObj.top !== undefined) query.set('top', scaleObj.top);
            }
            if (imageObj) {
                if (imageObj.brightness !== undefined) query.set('brightness', imageObj.brightness);
                if (imageObj.contrast !== undefined) query.set('contrast', imageObj.contrast);
                if (imageObj.saturate !== undefined) query.set('saturate', imageObj.saturate);
                if (imageObj.hue !== undefined) query.set('hue', imageObj.hue);
            }
        } else if (historyMap[title]) {
            const record = historyMap[title];
            query.set('resumeLine', record.lineIndex);
            query.set('resumeTime', record.time);
            if (record.jsitem !== undefined) query.set('jsitem', record.jsitem);
            if (record.scale !== undefined) query.set('scale', record.scale);
            if (record.width !== undefined) query.set('width', record.width);
            if (record.height !== undefined) query.set('height', record.height);
            if (record.top !== undefined) query.set('top', record.top);
            if (record.brightness !== undefined) query.set('brightness', record.brightness);
            if (record.contrast !== undefined) query.set('contrast', record.contrast);
            if (record.saturate !== undefined) query.set('saturate', record.saturate);
            if (record.hue !== undefined) query.set('hue', record.hue);
        }
        if (isSeries && seriesPath) {
            query.set('seriesPath', seriesPath);
            query.set('isSeries', '1');
        }
        window.location.href = `play.html?${query.toString()}`;
    }

    async function loadMoviesData() {
        try {
            const response = await fetch('1.json');
            if (!response.ok) throw new Error('电影数据加载失败');
            const json = await response.json();
            if (json && json.data_v && Array.isArray(json.data_v)) {
                allMovies = json.data_v.map(movie => ({ ...movie, originalPf: parseFloat(movie.pf) || 0, type: 'movie' }));
                movieMap = {};
                allMovies.forEach(m => { if (m.name) movieMap[m.name] = m; });
            }
        } catch (err) { console.error(err); }
    }
    async function loadSeriesData() {
        try {
            const response = await fetch('./2.json');
            if (!response.ok) throw new Error('连续剧数据加载失败');
            const json = await response.json();
            if (json && json.data_v && Array.isArray(json.data_v)) {
                allSeries = json.data_v.map(series => {
                    let note = '';
                    let pureName = series.name;
                    const bracketMatch = series.name.match(/\[([^\]]+)\]/);
                    if (bracketMatch) { note = bracketMatch[1]; pureName = series.name.replace(/\[[^\]]+\]/, '').trim(); }
                    return { ...series, pureName, note, originalPf: parseFloat(series.pf) || 0, type: 'series', path: series.path };
                });
                seriesMap = {};
                allSeries.forEach(s => { if (s.pureName) seriesMap[s.pureName] = s; });
            }
        } catch (err) { console.error(err); }
    }
    async function loadAllData() { await Promise.all([loadMoviesData(), loadSeriesData()]); if (currentView === 'movie') applyMovieFilterAndRender(); else if (currentView === 'tv') applySeriesFilterAndRender(); else if (currentView === 'history') renderHistoryView(); }
    function loadHistoryFromIApp() {
        try {
            if (typeof iapp !== 'undefined' && iapp.g) {
                const historyStr = iapp.g('sss.b');
                if (historyStr && historyStr !== 'null' && historyStr !== 'undefined') {
                    const historyData = JSON.parse(historyStr);
                    if (historyData && historyData.data_ls && Array.isArray(historyData.data_ls)) {
                        historyRecords = [...historyData.data_ls];
                        historyRecords.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
                        historyMap = {};
                        historyRecords.forEach(record => {
                            if (record.title) {
                                historyMap[record.title] = {
                                    lineIndex: record.lineIndex,
                                    time: record.time,
                                    jsitem: record.jsitem,
                                    scale: record.scale,
                                    width: record.width,
                                    height: record.height,
                                    top: record.top,
                                    brightness: record.brightness,
                                    contrast: record.contrast,
                                    saturate: record.saturate,
                                    hue: record.hue
                                };
                            }
                        });
                        return;
                    }
                }
            }
            historyRecords = []; historyMap = {};
        } catch(e) { historyRecords = []; historyMap = {}; }
    }

    async function fetchEpisodeForSeries(seriesPath, episodeNum) {
        try {
            const response = await fetch(`./LXJ/${seriesPath}.json`);
            if (!response.ok) return null;
            const json = await response.json();
            if (json && json.data_v && Array.isArray(json.data_v)) return json.data_v.find(ep => parseInt(ep.name) === episodeNum) || null;
            return null;
        } catch(e) { return null; }
    }
    async function playSeriesFromHistory(series, lineIndex, time, episodeNum, scaleObj, imageObj) {

        const tempMovie = { name: series.pureName, img: series.img };
        for (let key in episodeData) if (key.startsWith('url')) tempMovie[key] = episodeData[key];
        goToPlayer(tempMovie, lineIndex, time, episodeNum, scaleObj, imageObj, true, series.path);
    }

        currentSeries = series;
        listView.style.display = 'none';
        searchResultView.style.display = 'none';
        episodeSelectorView.classList.add('active');
        if (series.note && series.note.trim() !== '') {

            seriesStamp.style.display = 'none';
        }
        const episodes = await loadEpisodes(series.path);

        episodeTitle.textContent = series.pureName;

        episodes.forEach(ep => {
            const btn = document.createElement('div');

                        scaleObj = { scale: record.scale, width: record.width, height: record.height, top: record.top };
                    }
                    if (record.brightness !== undefined || record.contrast !== undefined || record.saturate !== undefined || record.hue !== undefined) {
                        imageObj = { brightness: record.brightness, contrast: record.contrast, saturate: record.saturate, hue: record.hue };

    async function loadEpisodes(path) { try { const res = await fetch(`./LXJ/${path}.json`); if (!res.ok) return []; const json = await res.json(); return (json && json.data_v && Array.isArray(json.data_v)) ? json.data_v : []; } catch(e) { return []; } }
    function hideEpisodeSelector() { episodeSelectorView.classList.remove('active'); if (searchResultView.style.display === 'block') listView.style.display = 'none'; else listView.style.display = 'block'; if (currentView === 'tv') restoreSeriesScrollPosition(); if (currentView === 'tv') applySeriesFilterAndRender(); scrollToTop(); }
    function saveSeriesScrollPosition() { if (currentView === 'tv' && listView.style.display !== 'none') seriesScrollPosition = appContainer.scrollTop; }
    function restoreSeriesScrollPosition() { if (currentView === 'tv') setTimeout(() => appContainer.scrollTo({ top: seriesScrollPosition, behavior: 'auto' }), 50); }

    // 历史记录页渲染（支持过滤和长按删除）
    function renderHistoryView() {
        if (currentView !== 'history') return;
        listView.classList.add('history-active');
        paginationArea.style.display = 'none';
        let recordsToShow = [...historyRecords];
        if (currentSearchKeyword.trim() !== '') {
            recordsToShow = recordsToShow.filter(item => item.title && item.title.toLowerCase().includes(currentSearchKeyword.trim().toLowerCase()));
        }
        // 根据过滤器过滤
        if (currentHistoryFilter === 'movie') {
            recordsToShow = recordsToShow.filter(item => !!movieMap[item.title]);
        } else if (currentHistoryFilter === 'series') {
            recordsToShow = recordsToShow.filter(item => !!seriesMap[item.title]);
        }
        if (!recordsToShow.length) { moviesContainer.innerHTML = '<div class="empty-msg">📭 没有播放记录。</div>'; return; }
        let html = '';
        for (const item of recordsToShow) {
            const isMovie = !!movieMap[item.title], isSeries = !!seriesMap[item.title];
            let posterUrl = 'https://placehold.co/300x450?text=No+Poster', rating = '暂无';
            if (isMovie) { const m = movieMap[item.title]; posterUrl = m.img || posterUrl; rating = m.pf ? parseFloat(m.pf).toFixed(1) : '暂无'; }
            else if (isSeries) { const s = seriesMap[item.title]; posterUrl = s.img || posterUrl; rating = s.pf ? parseFloat(s.pf).toFixed(1) : '暂无'; }
            const timeStr = formatTime(item.time);
            const episodeInfo = (isSeries && item.jsitem) ? `<span>第${item.jsitem}集</span>` : '';
            html += `<div class="movie-card" 
                data-title="${escapeHtml(item.title)}" 
                data-line="${item.lineIndex}" 
                data-time="${item.time}" 
                data-jsitem="${item.jsitem || ''}" 
                data-type="${isMovie ? 'movie' : 'series'}"
                data-scale="${item.scale ?? ''}"
                data-width="${item.width ?? ''}"
                data-height="${item.height ?? ''}"
                data-top="${item.top ?? ''}"
                data-brightness="${item.brightness ?? ''}"
                data-contrast="${item.contrast ?? ''}"
                data-saturate="${item.saturate ?? ''}"
                data-hue="${item.hue ?? ''}"
            ><div class="poster"><img src="${posterUrl}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Error'"><div class="rating"><i class="fas fa-star"></i> ${rating}</div><div class="type-badge ${isMovie ? 'movie' : 'series'}">${isMovie ? '电影' : '连续剧'}</div><div class="play-progress"><i class="fas fa-play-circle"></i> 继续播放 ${timeStr}${episodeInfo ? `<br>${episodeInfo}` : ''}</div></div><div class="movie-info"><div class="movie-title">${escapeHtml(item.title)}</div></div></div>`;
        }
        moviesContainer.innerHTML = html;
        // 绑定点击事件
        document.querySelectorAll('#listView.history-active .movie-card').forEach(card => {
            card.addEventListener('click', async (e) => {
                // 如果点击的是长按菜单按钮，不触发跳转
                if (e.target.closest('.longpress-menu')) return;
                const title = card.getAttribute('data-title');
                const lineIndex = parseInt(card.getAttribute('data-line'));
                const time = parseFloat(card.getAttribute('data-time'));
                const jsitem = card.getAttribute('data-jsitem') ? parseInt(card.getAttribute('data-jsitem')) : null;
                const type = card.getAttribute('data-type');
                const scaleObj = {
                    scale: parseFloat(card.getAttribute('data-scale')),
                    width: parseFloat(card.getAttribute('data-width')),
                    height: parseFloat(card.getAttribute('data-height')),
                    top: parseFloat(card.getAttribute('data-top'))
                };
                const imageObj = {
                    brightness: parseFloat(card.getAttribute('data-brightness')),
                    contrast: parseFloat(card.getAttribute('data-contrast')),
                    saturate: parseFloat(card.getAttribute('data-saturate')),
                    hue: parseFloat(card.getAttribute('data-hue'))
                };
                for (let k in scaleObj) if (isNaN(scaleObj[k])) delete scaleObj[k];
                for (let k in imageObj) if (isNaN(imageObj[k])) delete imageObj[k];
                if (type === 'movie') {
                    const movieData = movieMap[title];
                    if (movieData) goToPlayer(movieData, lineIndex, time, jsitem, scaleObj, imageObj, false);
                    else alert('影片信息缺失');
                } else if (type === 'series') {
                    const seriesData = seriesMap[title];
                    if (seriesData) await playSeriesFromHistory(seriesData, lineIndex, time, jsitem, scaleObj, imageObj);
                    else alert('剧集信息缺失');
                }
            });
            // 长按显示删除菜单
            let longPressTimer = null;
            card.addEventListener('touchstart', (e) => {
                longPressTimer = setTimeout(() => {
                    showLongPressMenu(card);
                }, 500);
            });
            card.addEventListener('touchend', () => {
                if (longPressTimer) clearTimeout(longPressTimer);
            });
            card.addEventListener('touchmove', () => {
                if (longPressTimer) clearTimeout(longPressTimer);
            });
            card.addEventListener('mousedown', (e) => {
                longPressTimer = setTimeout(() => {
                    showLongPressMenu(card);
                }, 500);
            });
            card.addEventListener('mouseup', () => {
                if (longPressTimer) clearTimeout(longPressTimer);
            });
            card.addEventListener('mouseleave', () => {
                if (longPressTimer) clearTimeout(longPressTimer);
            });
        });
        setTimeout(() => updateItemsPerPage(), 20);
    }

    // 显示长按菜单（删除/取消）
    function showLongPressMenu(card) {
        // 移除已存在的菜单
        const existingMenu = card.querySelector('.longpress-menu');
        if (existingMenu) existingMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'longpress-menu';
        menu.innerHTML = `<button class="delete-btn">删除</button><button class="cancel-btn">取消</button>`;
        card.style.position = 'relative';
        card.appendChild(menu);
        const deleteBtn = menu.querySelector('.delete-btn');
        const cancelBtn = menu.querySelector('.cancel-btn');
        deleteBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const title = card.getAttribute('data-title');
            if (title && typeof iapp !== 'undefined' && iapp.fn) {
                iapp.fn(`history_manager.del("${title.replace(/"/g, '\\"')}")`);
                // 等待一小段时间让 iApp 处理，然后刷新历史记录
                setTimeout(() => {
                    loadHistoryFromIApp();
                    renderHistoryView();
                }, 200);
            } else {
                alert('无法连接到 iApp 或标题无效');
            }
            menu.remove();
        });
        cancelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.remove();
        });
        // 点击卡片其他地方关闭菜单（可选，但为避免干扰，点击菜单外关闭）
        const closeMenu = (e) => {
            if (!menu.contains(e.target)) {
                menu.remove();
                document.removeEventListener('click', closeMenu);
            }
        };
        setTimeout(() => {
            document.addEventListener('click', closeMenu);
        }, 0);
    }

            if (btn.getAttribute('data-filter') === filter) btn.classList.add('active');

    }

    function performGlobalSearch() { 
        const kw = searchInput.value.trim(); if(kw === ''){ clearGlobalSearch(); return; } currentSearchKeyword = kw;
        const movieResults = allMovies.filter(m=>m.name && m.name.toLowerCase().includes(kw.toLowerCase()));
        const seriesResults = allSeries.filter(s=>s.pureName && s.pureName.toLowerCase().includes(kw.toLowerCase()));
        globalSearchResults = [...movieResults.map(m=>({type:'movie',data:m})), ...seriesResults.map(s=>({type:'series',data:s}))];

    }
    function renderGlobalSearch() { 
        const start=(globalSearchCurrentPage-1)*itemsPerPage,end=start+itemsPerPage,pageItems=globalSearchResults.slice(start,end);

        searchResultContainer.innerHTML=html; 
        document.querySelectorAll('[data-search-item]').forEach(card=>{ card.addEventListener('click',()=>{ const item=JSON.parse(card.getAttribute('data-search-item')); if(item.type==='movie') goToPlayer(item.data); else { saveSeriesScrollPosition(); showEpisodeSelector(item.data); } }); }); 
        const totalPages=Math.ceil(globalSearchTotal/itemsPerPage); if(totalPages<=1)searchResultPagination.style.display='none'; else { searchResultPagination.style.display='flex'; searchPageIndicator.textContent = `${globalSearchCurrentPage}/${totalPages}`; let circlesHtml=''; for(let i=1;i<=totalPages;i++)circlesHtml+=`<div class="page-circle ${i===globalSearchCurrentPage?'active-page':''}" data-page="${i}">${i}</div>`; searchPageCircles.innerHTML=circlesHtml; document.querySelectorAll('#searchPageCircles .page-circle').forEach(c=>c.addEventListener('click',()=>{const p=parseInt(c.getAttribute('data-page')); if(p&&p!==globalSearchCurrentPage){ globalSearchCurrentPage=p; renderGlobalSearch(); }})); searchPrevBtn.classList.toggle('disabled',globalSearchCurrentPage===1); searchNextBtn.classList.toggle('disabled',globalSearchCurrentPage===totalPages); } 
        setTimeout(() => updateItemsPerPage(), 20);
    }
    function clearGlobalSearch(){ 
        searchInput.value=''; currentSearchKeyword=''; globalSearchResults=[];

        if (currentView === 'movie') {

    function renderPagination(totalItems) {

    function switchToTVView() {
        if (episodeSelectorView.classList.contains('active')) hideEpisodeSelector();
        // 如果当前在搜索结果页，清除搜索并切换到连续剧视图

            clearGlobalSearch();
        }
        if (currentView === 'tv') { scrollToTop(); return; }
        currentView = 'tv';
        listView.classList.remove('history-active');
        hideEpisodeSelector();
        clearGlobalSearch(); // 确保搜索被清除
        currentSearchKeyword = ''; searchInput.value = ''; searchSlide.classList.remove('open'); updateSearchToggleButtonText(false);
        currentSortMode = 'default';
        applySeriesFilterAndRender();
        paginationArea.style.display = 'flex';
        setActiveNavByView('tv');
        scrollToTop();
    }
    function switchToMovieView(){ 
        if (episodeSelectorView.classList.contains('active')) hideEpisodeSelector();
        if (searchResultView.style.display === 'block') {
            clearGlobalSearch();
        }
        if(currentView==='movie'){ scrollToTop(); return; } 
        currentView='movie'; 
        listView.classList.remove('history-active'); 
        hideEpisodeSelector(); 
        clearGlobalSearch(); 
        currentSearchKeyword=''; searchInput.value=''; searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); 
        currentSortMode='default'; 
        applyMovieFilterAndRender(); 
        paginationArea.style.display='flex'; 
        setActiveNavByView('movie'); 
        scrollToTop(); 
    }
    function switchToRatingView(){ if(currentView!=='movie'&&currentView!=='tv') return; currentSortMode=currentSortMode==='rating'?'default':'rating'; if(currentView==='movie') applyMovieFilterAndRender(); else applySeriesFilterAndRender(); if(ratingBtn) ratingBtn.classList.toggle('active',currentSortMode==='rating'); scrollToTop(); }
    function switchToHistoryView(){ 
        if(currentView==='history'){ scrollToTop(); return; } 
        currentView='history'; 
        listView.classList.add('history-active'); 
        hideEpisodeSelector(); 
        clearGlobalSearch(); 
        currentSearchKeyword=''; 
        searchInput.value=''; 
        searchSlide.classList.remove('open'); 
        updateSearchToggleButtonText(false); 
        loadHistoryFromIApp(); 
        renderHistoryView(); 
        paginationArea.style.display='none'; 
        setActiveNavByView('history'); 
        scrollToTop(); 
    }
    function setActiveNavByView(view){ 
        document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active')); 
        if(view==='movie') document.querySelector('[data-view="movie"]')?.classList.add('active'); 
        else if(view==='tv') document.querySelector('[data-view="tv"]')?.classList.add('active'); 
        else if(view==='history') historyBtn.classList.add('active'); 
        if(ratingBtn){ if((currentView==='movie'||currentView==='tv')&&currentSortMode==='rating') ratingBtn.classList.add('active'); else ratingBtn.classList.remove('active'); } 
        // 控制历史工具栏显示
        if (view === 'history') {
            historyToolbar.style.display = 'flex';
        } else {
            historyToolbar.style.display = 'none';
        }
    }
    function updateSearchToggleButtonText(isOpen){ if(isOpen){ searchToggleBtn.innerHTML='<i class="fas fa-times"></i> 取消'; searchToggleBtn.classList.add('active'); }else{ searchToggleBtn.innerHTML='<i class="fas fa-search"></i> 搜索'; searchToggleBtn.classList.remove('active'); } }
    function closeSearch(){ if(searchSlide.classList.contains('open')){ searchSlide.classList.remove('open'); updateSearchToggleButtonText(false); } }
    function openSearch(){ if(!searchSlide.classList.contains('open')){ searchSlide.classList.add('open'); updateSearchToggleButtonText(true); searchInput.focus(); } }
    
    if (clearHistoryBtn) {
        clearHistoryBtn.addEventListener('click', () => {
            if (currentView !== 'history') return;
            if (confirm('确定要清除所有观看记录吗？此操作不可恢复。')) {
                if (typeof iapp !== 'undefined' && iapp.fn) {
                    iapp.fn('history_manager.clear("1")');
                    if (typeof tw === 'function') tw("正在清除观看记录...");
                    setTimeout(() => {
                        loadHistoryFromIApp();
                        renderHistoryView();
                        if (historyRecords.length === 0) moviesContainer.innerHTML = '<div class="empty-msg">📭 没有播放记录。</div>';
                    }, 500);
                } else alert("无法连接到 iApp 环境");
            }
        });
    }

    // 历史页过滤按钮事件
    function initHistoryFilters() {
        const filterBtns = document.querySelectorAll('.history-filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.getAttribute('data-filter');
                if (filter) setHistoryFilter(filter);
            });
        });
    }

    function initButtons(){
        document.querySelector('[data-view="movie"]')?.addEventListener('click', switchToMovieView);
        document.querySelector('[data-view="tv"]')?.addEventListener('click', switchToTVView);
        ratingBtn?.addEventListener('click', switchToRatingView);
        refreshBtn?.addEventListener('click', async () => { await loadAllData(); if(currentView==='movie') applyMovieFilterAndRender(); else if(currentView==='tv') applySeriesFilterAndRender(); else if(currentView==='history'){ loadHistoryFromIApp(); renderHistoryView(); } scrollToTop(); });
        homeBtn?.addEventListener('click', switchToMovieView);
        historyBtn?.addEventListener('click', switchToHistoryView);
        backToSeriesBtn?.addEventListener('click', hideEpisodeSelector);
        searchToggleBtn.addEventListener('click',(e)=>{ e.stopPropagation(); searchSlide.classList.contains('open')?closeSearch():openSearch(); });
        searchConfirm.addEventListener('click',()=>{ if(currentView==='history'){ currentSearchKeyword=searchInput.value.trim(); renderHistoryView(); closeSearch(); }else{ performGlobalSearch(); closeSearch(); } });
        searchInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter'){ if(currentView==='history'){ currentSearchKeyword=searchInput.value.trim(); renderHistoryView(); closeSearch(); }else{ performGlobalSearch(); closeSearch(); } } });
        prevBtn.addEventListener('click',goPrevPage); nextBtn.addEventListener('click',goNextPage);
        searchPrevBtn.addEventListener('click',()=>{ if(globalSearchCurrentPage>1){ globalSearchCurrentPage--; renderGlobalSearch(); } });
        searchNextBtn.addEventListener('click',()=>{ const totalPages=Math.ceil(globalSearchTotal/itemsPerPage); if(globalSearchCurrentPage<totalPages){ globalSearchCurrentPage++; renderGlobalSearch(); } });
        initHistoryFilters();
    }
    async function init(){ loadHistoryFromIApp(); await loadAllData(); initButtons(); currentView='movie'; applyMovieFilterAndRender(); scrollToTop(); }
    init();
</script>
</body>
</html>
