<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>播放器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary-color: #f97e2c; --main-text-color: #ffffff; --button-color: #ffffff; --secondary-text-color: #dddddd; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        .player-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100000; background: #000; overflow: hidden; }
        .player-container { width: 100%; height: 100%; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; transition: transform 0.05s linear; }
        video::-webkit-media-controls { display: none !important; }
        .time-display { position: absolute; top: 16px; left: 16px; color: var(--main-text-color); font-size: 14px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.5); z-index: 25; background: transparent; font-family: monospace; }
        .buffer-info { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 6px; background: transparent; padding: 4px 8px; border-radius: 20px; z-index: 25; font-size: 12px; font-weight: 500; color: var(--main-text-color); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .buffer-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #fff; transition: background-color 0.3s ease; }
        .buffer-dot.red { background-color: #ff4444; }
        .buffer-dot.light-red { background-color: #ff8888; }
        .buffer-dot.yellow { background-color: #ffaa33; }
        .buffer-dot.green { background-color: #66ff66; }
        .buffer-dot.blue { background-color: #4da6ff; }
        .buffer-text { font-family: monospace; color: var(--main-text-color); }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .loading-overlay.show { opacity: 1; visibility: visible; }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 20px 16px 16px;
            transition: opacity 0.3s ease;
            z-index: 20;
        }
        .controls.hide { opacity: 0; visibility: hidden; }
        .progress-bar-container { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .progress-time { color: var(--main-text-color); font-size: 12px; min-width: 45px; text-align: center; font-family: monospace; }
        .progress-slider { flex: 1; position: relative; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; cursor: pointer; }
        .progress-buffered { position: absolute; left: 0; top: 0; height: 100%; background: #90EE90; border-radius: 2px; width: 0%; transition: width 0.2s ease-out; pointer-events: none; }
        .progress-current { position: absolute; left: 0; top: 0; height: 100%; background: var(--primary-color); border-radius: 2px; width: 0%; pointer-events: none; z-index: 2; }
        .progress-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; background: var(--primary-color); border-radius: 50%; cursor: pointer; display: block; z-index: 3; box-shadow: 0 0 4px rgba(0,0,0,0.4); transition: transform 0.1s ease; }
        .progress-thumb:active { transform: translate(-50%, -50%) scale(1.3); }
        .controls-bottom { display: flex; align-items: center; justify-content: space-between; }
        .controls-left { display: flex; align-items: center; gap: 16px; }
        .control-btn { background: transparent; border: none; color: var(--button-color); cursor: pointer; transition: 0.2s; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .control-btn:active { transform: scale(0.92); }
        .video-title { color: var(--main-text-color); font-size: 14px; font-weight: 500; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls-right { display: flex; align-items: center; gap: 16px; position: relative; }
        .mandarin-bubble { position: absolute; right: calc(100% + 12px); top: 50%; transform: translateY(-50%) scale(1); background-color: var(--primary-color); color: #000; font-size: 12px; font-weight: bold; padding: 6px 12px; border-radius: 8px; white-space: nowrap; z-index: 50; box-shadow: 0 0 8px rgba(249,126,44,0.8); animation: breatheScale 1.2s infinite ease-in-out; pointer-events: none; transform-origin: right center; }
        .mandarin-bubble::after { content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-style: solid; border-width: 6px 0 6px 8px; border-color: transparent transparent transparent var(--primary-color); }
        @keyframes breatheScale { 0% { transform: translateY(-50%) scale(1); box-shadow: 0 0 0 0 rgba(249,126,44,0.7); opacity: 0.9; } 70% { transform: translateY(-50%) scale(1.08); box-shadow: 0 0 0 8px rgba(249,126,44,0); opacity: 1; } 100% { transform: translateY(-50%) scale(1); box-shadow: 0 0 0 0 rgba(249,126,44,0); opacity: 0.9; } }
        .source-item { background: #252530; border-radius: 8px; padding: 12px; cursor: pointer; color: var(--button-color); transition: 0.2s; border: 1px solid #3a3a48; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .source-item:active { transform: scale(0.97); }
        .source-item.active { background: var(--primary-color); color: #000; border: none !important; outline: none; }
        .source-remark-badge { position: absolute; top: 0; right: 0; width: 100px; height: 30px; background-color: var(--primary-color); color: #000; font-size: 12px; font-weight: bold; transform: rotate(45deg) translate(20%, 160%); transform-origin: top right; white-space: nowrap; z-index: 2; box-shadow: -1px 1px 4px rgba(0,0,0,0.3); pointer-events: none; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; text-overflow: ellipsis; }
        .source-item.active .source-remark-badge { background-color: #000; color: var(--primary-color); }
        .transform-panel { background: #1a1a24; padding: 20px; }
        .transform-control { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .transform-control label { font-size: 14px; color: var(--main-text-color); width: 80px; }
        .transform-buttons { display: flex; align-items: center; gap: 8px; }
        .transform-btn { background: #2c2c3a; border: 1px solid #666; color: var(--button-color); width: 36px; height: 36px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .transform-btn:active { background: var(--primary-color); color: #000; }
        .transform-value { width: 60px; text-align: center; font-size: 14px; color: var(--primary-color); font-weight: bold; background: #000; padding: 8px 0; border-radius: 5px; }
        .reset-transform-btn { background: var(--primary-color); border: none; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .reset-transform-btn:active { opacity: 0.8; }
        .sidebar-mask { position: fixed; top: 0; right: 0; width: 0; height: 100%; background: transparent; z-index: 200000; transition: width 0.3s ease; display: flex; justify-content: flex-end; }
        .sidebar-mask.open { width: 100%; }
        .sidebar { width: 280px; height: 100%; background: #1a1a24; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; border-left: 1px solid #2f2f3e; }
        .sidebar-mask.open .sidebar { transform: translateX(0); }
        .sidebar-header { padding: 16px; text-align: center; font-size: 16px; font-weight: 600; color: var(--main-text-color); border-bottom: 1px solid #2f2f3e; flex-shrink: 0; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
        .sidebar-footer { padding: 16px; text-align: center; border-top: 1px solid #2f2f3e; flex-shrink: 0; }
        .close-sidebar-btn { background: var(--primary-color); border: none; padding: 12px 20px; border-radius: 30px; color: var(--button-color); font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .close-sidebar-btn:active { opacity: 0.8; transform: scale(0.98); }
        .episodes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .episode-btn { aspect-ratio: 2 / 1; background: #252530; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--button-color); cursor: pointer; transition: 0.2s; border: 1px solid #3a3a48; position: relative; }
        .episode-btn:active { transform: scale(0.95); }
        .episode-btn.active { background: var(--primary-color); color: #000; border-color: var(--primary-color); }
        .episode-btn.has-record { border: 2px solid var(--primary-color); background: rgba(249,126,44,0.15); animation: breatheRecord 1.5s ease-in-out infinite; }
        .record-play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; color: #fff; text-shadow: 0 0 6px var(--primary-color); pointer-events: none; animation: breatheIcon 1.5s ease-in-out infinite; }
        @keyframes breatheRecord { 0% { box-shadow:0 0 0 2px rgba(249,126,44,0.5); } 50% { box-shadow:0 0 0 6px rgba(249,126,44,0.2); } 100% { box-shadow:0 0 0 2px rgba(249,126,44,0.5); } }
        @keyframes breatheIcon { 0% { opacity:0.8; transform:translate(-50%,-50%) scale(0.95); } 50% { opacity:1; transform:translate(-50%,-50%) scale(1.1); } 100% { opacity:0.8; transform:translate(-50%,-50%) scale(0.95); } }
        .seek-time-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; color: #fff; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 200001; display: none; white-space: nowrap; }
        .center-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 40px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 200002;
            display: none;
            white-space: nowrap;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <div class="player-container">
            <video id="video" autoplay playsinline webkit-playsinline crossorigin="anonymous" poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></video>
            <div class="time-display" id="timeDisplay"></div>
            <div class="buffer-info" id="bufferInfo">
                <div class="buffer-dot red" id="bufferDot"></div>
                <span class="buffer-text" id="bufferText">0 s</span>
            </div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
            <div class="controls" id="controls">
                <div class="progress-bar-container">
                    <span class="progress-time" id="currentTimeDisplay">00:00</span>
                    <div class="progress-slider" id="progressSlider">
                        <div class="progress-buffered" id="bufferedBar"></div>
                        <div class="progress-current" id="progressBar"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                    <span class="progress-time" id="durationDisplay">00:00</span>
                </div>
                <div class="controls-bottom">
                    <div class="controls-left">
                        <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                        <span class="video-title" id="videoTitle">加载中...</span>
                    </div>
                    <div class="controls-right" id="controlsRight">
                        <div style="position: relative; display: flex; align-items: center;">
                            <button class="control-btn" id="sourceSelectBtn"><i class="fas fa-code-branch"></i></button>
                            <div id="mandarinBubble" class="mandarin-bubble" style="display: none;">有国语线路</div>
                        </div>
                        <button class="control-btn" id="nextEpisodeBtn" style="display: none;"><i class="fas fa-step-forward"></i></button>
                        <button class="control-btn" id="episodeSelectBtn" style="display: none;"><i class="fas fa-th"></i></button>
                        <button class="control-btn" id="transformBtn" title="视频缩放调节"><i class="fas fa-laptop-code"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-mask" id="episodeSidebar"><div class="sidebar"><div class="sidebar-header">剧集列表</div><div class="sidebar-content" id="episodeListContainer"></div><div class="sidebar-footer"><button class="close-sidebar-btn" data-sidebar="episode">关闭</button></div></div></div>
    <div class="sidebar-mask" id="sourceSidebar"><div class="sidebar"><div class="sidebar-header">线路选择</div><div class="sidebar-content" id="sourceListContainer"></div><div class="sidebar-footer"><button class="close-sidebar-btn" data-sidebar="source">关闭</button></div></div></div>
    <div class="sidebar-mask" id="transformSidebar">
        <div class="sidebar">
            <div class="sidebar-header">视频缩放调节</div>
            <div class="sidebar-content transform-panel">
                <div class="transform-control"><label>整体缩放</label><div class="transform-buttons"><button class="transform-btn" data-type="overall" data-delta="-1">-</button><span class="transform-value" id="overallVal">100</span><button class="transform-btn" data-type="overall" data-delta="1">+</button></div></div>
                <div class="transform-control"><label>宽度缩放</label><div class="transform-buttons"><button class="transform-btn" data-type="width" data-delta="-1">-</button><span class="transform-value" id="widthVal">100</span><button class="transform-btn" data-type="width" data-delta="1">+</button></div></div>
                <div class="transform-control"><label>高度缩放</label><div class="transform-buttons"><button class="transform-btn" data-type="height" data-delta="-1">-</button><span class="transform-value" id="heightVal">100</span><button class="transform-btn" data-type="height" data-delta="1">+</button></div></div>
                <div class="transform-control"><label>垂直移动</label><div class="transform-buttons"><button class="transform-btn" data-type="vertical" data-delta="-1">-</button><span class="transform-value" id="verticalVal">100</span><button class="transform-btn" data-type="vertical" data-delta="1">+</button></div></div>
                <button class="reset-transform-btn" id="resetTransformBtn">重置</button>
            </div>
            <div class="sidebar-footer"><button class="close-sidebar-btn" data-sidebar="transform">关闭</button></div>
        </div>
    </div>
    <div class="seek-time-popup" id="seekTimePopup"></div>
    <div class="center-popup" id="centerPopup"></div>

    <script>
        function callAndroid(method, ...args) {
            if (typeof androidBridge !== 'undefined' && androidBridge[method]) {
                try {
                    var result = androidBridge[method](...args);
                    if (result === undefined || result === null) {
                        return -1;
                    }
                    return result;
                } catch(e) {
                    console.warn(method, e);
                    return -1;
                }
            }
            return -1;
        }

        function setVolume(percent) {
            callAndroid('setVolume', Math.round(percent));
        }

        function getSystemVolume() {
            var val = callAndroid('getVolume');
            if (val === -1 || isNaN(val) || val < 0) return 50;
            return Math.min(100, Math.max(0, Math.round(val)));
        }

        function setBrightness(percent) {
            callAndroid('setBrightness', Math.round(percent));
        }

        function getSystemBrightness() {
            var val = callAndroid('getBrightness');
            if (val === -1 || typeof val !== 'number' || isNaN(val)) {
                return -1;
            }
            if (val < 0) val = 0;
            if (val > 255) val = 255;
            var percent = Math.round((val / 255) * 100);
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;
            return percent;
        }

        function toggleFullscreen() {
            callAndroid('toggleFullscreen');
        }

        const PLAYER_SETTINGS_KEY = 'player_settings_v1';
        let playerSettings = {
            preferMandarin: false,
            timeDisplay: { show: true, font: 'normal', color: '#ffffff', shadow: false, shadowColor: '#000000' },
            bufferDisplay: { show: true, font: 'normal', color: '#ffffff', shadow: false, shadowColor: '#000000' },
            theme: { primaryColor: '#f97e2c', mainTextColor: '#ffffff', buttonColor: '#ffffff', secondaryTextColor: '#dddddd' }
        };
        function loadPlayerSettings() {
            const saved = localStorage.getItem(PLAYER_SETTINGS_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    playerSettings = { ...playerSettings, ...parsed };
                    if (!playerSettings.timeDisplay) playerSettings.timeDisplay = { show: true, font: 'normal', color: '#ffffff', shadow: false, shadowColor: '#000000' };
                    if (!playerSettings.bufferDisplay) playerSettings.bufferDisplay = { show: true, font: 'normal', color: '#ffffff', shadow: false, shadowColor: '#000000' };
                    if (!playerSettings.theme) playerSettings.theme = { primaryColor: '#f97e2c', mainTextColor: '#ffffff', buttonColor: '#ffffff', secondaryTextColor: '#dddddd' };
                } catch(e) {}
            }
        }
        loadPlayerSettings();

        function applyThemeToCSS() {
            document.documentElement.style.setProperty('--primary-color', playerSettings.theme.primaryColor);
            document.documentElement.style.setProperty('--main-text-color', playerSettings.theme.mainTextColor);
            document.documentElement.style.setProperty('--button-color', playerSettings.theme.buttonColor);
            document.documentElement.style.setProperty('--secondary-text-color', playerSettings.theme.secondaryTextColor);
            document.querySelectorAll('.close-sidebar-btn').forEach(btn => {
                btn.style.color = playerSettings.theme.buttonColor;
                btn.style.backgroundColor = playerSettings.theme.primaryColor;
            });
        }
        applyThemeToCSS();

        const timeDisplayElem = document.getElementById('timeDisplay');
        const bufferInfoElem = document.getElementById('bufferInfo');
        const bufferTextElem = document.getElementById('bufferText');
        const bufferDotElem = document.getElementById('bufferDot');

        function applyTimeDisplayStyle() {
            if (!timeDisplayElem) return;
            if (playerSettings.timeDisplay.show) {
                timeDisplayElem.style.display = 'block';
                let fontStyle = 'normal';
                let fontWeight = 'normal';
                if (playerSettings.timeDisplay.font === 'bold') fontWeight = 'bold';
                else if (playerSettings.timeDisplay.font === 'italic') fontStyle = 'italic';
                timeDisplayElem.style.fontWeight = fontWeight;
                timeDisplayElem.style.fontStyle = fontStyle;
                timeDisplayElem.style.color = playerSettings.timeDisplay.color;
                if (playerSettings.timeDisplay.shadow) {
                    timeDisplayElem.style.textShadow = `0 1px 2px ${playerSettings.timeDisplay.shadowColor}`;
                } else {
                    timeDisplayElem.style.textShadow = 'none';
                }
            } else {
                timeDisplayElem.style.display = 'none';
            }
        }

        function applyBufferDisplayStyle() {
            if (!bufferInfoElem) return;
            if (playerSettings.bufferDisplay.show) {
                bufferInfoElem.style.display = 'flex';
                let fontStyle = 'normal';
                let fontWeight = 'normal';
                if (playerSettings.bufferDisplay.font === 'bold') fontWeight = 'bold';
                else if (playerSettings.bufferDisplay.font === 'italic') fontStyle = 'italic';
                bufferTextElem.style.fontWeight = fontWeight;
                bufferTextElem.style.fontStyle = fontStyle;
                bufferTextElem.style.color = playerSettings.bufferDisplay.color;
                if (playerSettings.bufferDisplay.shadow) {
                    bufferTextElem.style.textShadow = `0 1px 2px ${playerSettings.bufferDisplay.shadowColor}`;
                    bufferDotElem.style.filter = `drop-shadow(0 1px 1px ${playerSettings.bufferDisplay.shadowColor})`;
                } else {
                    bufferTextElem.style.textShadow = 'none';
                    bufferDotElem.style.filter = 'none';
                }
            } else {
                bufferInfoElem.style.display = 'none';
            }
        }

        applyTimeDisplayStyle();
        applyBufferDisplayStyle();

        function updateBeijingTime() {
            const now = new Date();
            timeDisplayElem.textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        }
        setInterval(updateBeijingTime, 1000);
        updateBeijingTime();

        const playData = (() => {
            try {
                const data = localStorage.getItem('currentPlayData');
                if (data) return JSON.parse(data);
            } catch(e) {}
            return null;
        })();

        if (!playData) {
            alert('无播放数据，返回列表页');
            window.location.href = 'index.html';
        }

        const video = document.getElementById('video');
        const controls = document.getElementById('controls');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentTimeSpan = document.getElementById('currentTimeDisplay');
        const durationSpan = document.getElementById('durationDisplay');
        const progressSlider = document.getElementById('progressSlider');
        const progressBar = document.getElementById('progressBar');
        const bufferedBar = document.getElementById('bufferedBar');
        const progressThumb = document.getElementById('progressThumb');
        const videoTitle = document.getElementById('videoTitle');
        const nextEpisodeBtn = document.getElementById('nextEpisodeBtn');
        const episodeSelectBtn = document.getElementById('episodeSelectBtn');
        const sourceSelectBtn = document.getElementById('sourceSelectBtn');
        const episodeSidebar = document.getElementById('episodeSidebar');
        const sourceSidebar = document.getElementById('sourceSidebar');
        const transformSidebar = document.getElementById('transformSidebar');
        const seekPopup = document.getElementById('seekTimePopup');
        const bufferDot = document.getElementById('bufferDot');
        const bufferText = document.getElementById('bufferText');
        const mandarinBubble = document.getElementById('mandarinBubble');
        const transformBtn = document.getElementById('transformBtn');
        const centerPopup = document.getElementById('centerPopup');

        let hls = null;
        let currentSourceIndex = 0;
        let currentEpisodeIndex = 0;
        let episodesList = [];
        let isSeries = playData.type === 'series';
        let controlsTimeout = null;
        let isSeeking = false;
        let isPlaying = false;
        let currentEpisodeDisplay = isSeries && playData.episodeName ? playData.episodeName : '';
        let durationReady = false;
        let bubbleHidden = false;
        let isUserSwitching = false;
        let isEpisodeSwitch = false;
        let userValues = { overall: 100, width: 100, height: 100, vertical: 100 };
        if (playData.transformValues) userValues = { ...userValues, ...playData.transformValues };
        let accumulatedPlayTime = 0;
        let lastRecordedTime = 0;
        let recordTimer = null;
        let loadTimeoutTimer = null;
        let isSwitchingLine = false;
        let autoSwitchEnabled = true;
        window.__playerGesture = { progressActive: false, sliderActive: null };

        function showLoading(show) { loadingOverlay.classList.toggle('show', show); }
        function clearLoadTimeout() { if (loadTimeoutTimer) { clearTimeout(loadTimeoutTimer); loadTimeoutTimer = null; } }
        function setLoadTimeout() {
            if (!autoSwitchEnabled) return;
            clearLoadTimeout();
            loadTimeoutTimer = setTimeout(() => {
                if (!isPlaying || video.paused || video.readyState < 2) {
                    showCenterPopup('线路超时，尝试切换...', 1500);
                    autoSwitchToNextLine();
                }
            }, 20000);
        }
        function showCenterPopup(text, duration) {
            if (duration === undefined) duration = 2000;
            centerPopup.innerText = text;
            centerPopup.style.display = 'block';
            clearTimeout(window.centerPopupTimer);
            window.centerPopupTimer = setTimeout(() => {
                centerPopup.style.display = 'none';
            }, duration);
        }
        function autoSwitchToNextLine() {
            if (!autoSwitchEnabled || isSwitchingLine) return;
            if (!playData.sources || playData.sources.length <= 1) { showCenterPopup('所有线路不可用', 2000); return; }
            isSwitchingLine = true;
            let newIndex = (currentSourceIndex + 1) % playData.sources.length;
            if (newIndex === currentSourceIndex) { showCenterPopup('所有线路不可用', 2000); isSwitchingLine = false; return; }
            showCenterPopup(`切换到线路${newIndex+1}...`, 1000);
            switchSource(newIndex);
            isSwitchingLine = false;
        }
        function switchSource(index) {
            if (index === currentSourceIndex) return;
            finalSaveAndExit();
            const ct = video.currentTime || 0;
            currentSourceIndex = index;
            renderSourceList();
            sourceSidebar.classList.remove('open');
            showControls(true);
            updateBubbleVisibility();
            const src = playData.sources[index].url;
            isUserSwitching = true;
            autoSwitchEnabled = true;
            loadVideo(src, ct);
        }
        function loadVideo(url, seekTime) {
            if (hls) { hls.destroy(); hls = null; }
            durationReady = false;
            bufferedBar.style.width = '0%';
            bufferText.textContent = '0 s';
            bufferDot.className = 'buffer-dot red';
            showLoading(true);
            clearLoadTimeout();
            autoSwitchEnabled = true;
            setLoadTimeout();

            const onCanPlay = () => {
                video.removeEventListener('canplay', onCanPlay);
                let finalSeekTime = null;
                if (isEpisodeSwitch) { finalSeekTime = 0; isEpisodeSwitch = false; }
                else if (seekTime !== null && !isNaN(seekTime) && isFinite(seekTime) && seekTime > 0) {
                    finalSeekTime = Math.max(0, seekTime - 8);
                } else {
                    if (isSeries && playData.episodeName && currentEpisodeDisplay === playData.episodeName && playData.startTime && playData.startTime > 0) {
                        finalSeekTime = Math.max(0, playData.startTime - 8);
                    } else if (playData.startTime && playData.startTime > 0 && !isSeries) {
                        finalSeekTime = Math.max(0, playData.startTime - 8);
                    }
                }
                if (finalSeekTime !== null && finalSeekTime > 0) {
                    video.currentTime = finalSeekTime;
                }
                video.play().then(() => {
                    isPlaying = true;
                    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    showLoading(false);
                    clearLoadTimeout();
                    showControls(true);
                    updateBufferProgress();
                    accumulatedPlayTime = 0;
                    lastRecordedTime = Date.now();
                    startPlayTimer();
                    isUserSwitching = false;
                }).catch((err) => {
                    console.error('播放失败', err);
                    showLoading(false);
                    clearLoadTimeout();
                    if (autoSwitchEnabled) autoSwitchToNextLine();
                });
            };
            video.addEventListener('canplay', onCanPlay);
            if (url.includes('.m3u8') && Hls.isSupported()) {
                hls = new Hls({ enableWorker: true, maxBufferLength: 1800, maxMaxBufferLength: 3600, maxBufferSize: 1024*1000*1000, backBufferLength: 180 });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error('HLS错误', data);
                    showLoading(false);
                    clearLoadTimeout();
                    if (autoSwitchEnabled && !isSwitchingLine) autoSwitchToNextLine();
                });
            } else {
                video.src = url;
            }
        }

        function getWatchRecordKey() {
            if (isSeries) return `watch_record_series_${playData.path || playData.title}_${currentEpisodeDisplay || playData.episodeName || ''}`;
            else return `watch_record_movie_${playData.title}_${playData.year || ''}`;
        }
        function getCurrentTransformForSave() {
            const isDefault = userValues.overall === 100 && userValues.width === 100 && userValues.height === 100 && userValues.vertical === 100;
            return isDefault ? null : { ...userValues };
        }
        function saveCurrentWatch() {
            if (!video.duration || video.duration <= 0) return;
            let currentPlayPos = video.currentTime;
            if (currentPlayPos < 0) currentPlayPos = 0;
            const totalPlayed = accumulatedPlayTime;
            if (totalPlayed < 10 && currentPlayPos < 10) return;
            const record = {
                title: playData.title,
                type: isSeries ? 'series' : 'movie',
                poster: playData.poster,
                year: playData.year,
                pf: playData.pf,
                typeName: playData.typeName,
                currentTime: currentPlayPos,
                lastWatchTime: Date.now(),
                transformValues: getCurrentTransformForSave(),
                sourceIndex: currentSourceIndex,
                episodeName: isSeries ? currentEpisodeDisplay : null,
                path: isSeries ? playData.path : null
            };
            if (isSeries && currentEpisodeDisplay) {
                record.episodeName = currentEpisodeDisplay;
                const prefix = `watch_record_series_${playData.path}_`;
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith(prefix) && !key.endsWith(currentEpisodeDisplay)) {
                        localStorage.removeItem(key);
                    }
                }
            }
            const key = getWatchRecordKey();
            localStorage.setItem(key, JSON.stringify(record));
            lastRecordedTime = Date.now();
            if (isSeries && episodesList.length > 0) renderEpisodeList();
        }
        function startPlayTimer() {
            if (recordTimer) clearInterval(recordTimer);
            recordTimer = setInterval(() => {
                if (isPlaying && !video.paused && video.currentTime > 0 && video.duration > 0) {
                    accumulatedPlayTime += 1;
                    if (accumulatedPlayTime >= 10 && Date.now() - lastRecordedTime > 5000) {
                        saveCurrentWatch();
                    }
                }
            }, 1000);
        }
        function stopPlayTimer() { if (recordTimer) { clearInterval(recordTimer); recordTimer = null; } }
        function finalSaveAndExit() {
            if (isPlaying && video.currentTime > 0 && video.duration > 0) {
                const totalPlayed = accumulatedPlayTime;
                if (totalPlayed >= 10 || video.currentTime >= 10) saveCurrentWatch();
            }
        }
        window.addEventListener('beforeunload', finalSaveAndExit);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { finalSaveAndExit(); }
            else { if (isPlaying && !video.paused) startPlayTimer(); }
        });

        video.addEventListener('pause', () => {
            finalSaveAndExit();
            stopPlayTimer();
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controls.classList.remove('hide');
        });
        video.addEventListener('play', () => {
            accumulatedPlayTime = 0;
            lastRecordedTime = Date.now();
            startPlayTimer();
            showControls(true);
        });
        video.addEventListener('error', () => {
            finalSaveAndExit();
            showLoading(false);
            clearLoadTimeout();
            if (autoSwitchEnabled) autoSwitchToNextLine();

        video.addEventListener('waiting', () => {

        video.addEventListener('stalled', () => {

        video.addEventListener('playing', () => {

            clearLoadTimeout();
            showControls();
            updateBufferProgress();
            autoSwitchEnabled = false;
        });
        video.addEventListener('canplay', () => {
            if (isPlaying && !video.paused) {
                showLoading(false);
                clearLoadTimeout();
                showControls();
                autoSwitchEnabled = false;
            }
        });

        function updateVideoTransform() {
            const scaleX = (userValues.overall / 100) * (userValues.width / 100);
            const scaleY = (userValues.overall / 100) * (userValues.height / 100);
            const translateY = (userValues.vertical - 100);
            video.style.transform = `translateY(${translateY}%) scale(${scaleX}, ${scaleY})`;
            document.getElementById('overallVal').innerText = userValues.overall;
            document.getElementById('widthVal').innerText = userValues.width;
            document.getElementById('heightVal').innerText = userValues.height;
            document.getElementById('verticalVal').innerText = userValues.vertical;
        }
        function adjustTransform(type, delta) {
            let newVal;
            if (type === 'vertical') newVal = userValues.vertical - delta;
            else newVal = userValues[type] + delta;
            if (newVal < 0) newVal = 0;
            userValues[type] = newVal;
            updateVideoTransform();
            saveCurrentWatch();
        }
        function resetTransform() {
            userValues = { overall: 100, width: 100, height: 100, vertical: 100 };
            updateVideoTransform();
            saveCurrentWatch();
        }
        function attachLongPress(btn, type, delta) {
            let timer = null, intervalTimer = null;
            const startPress = (e) => {
                e.preventDefault();
                adjustTransform(type, delta);
                timer = setTimeout(() => {
                    intervalTimer = setInterval(() => { adjustTransform(type, delta); }, 100);
                }, 800);
            };
            const endPress = () => {
                if (timer) clearTimeout(timer);
                if (intervalTimer) clearInterval(intervalTimer);
                timer = null; intervalTimer = null;
            };
            btn.addEventListener('mousedown', startPress);
            window.addEventListener('mouseup', endPress);
            btn.addEventListener('touchstart', startPress, { passive: false });
            window.addEventListener('touchend', endPress);
            window.addEventListener('touchcancel', endPress);
        }
        function initTransformControls() {
            document.querySelectorAll('.transform-btn').forEach(btn => {
                const type = btn.getAttribute('data-type');
                const delta = parseInt(btn.getAttribute('data-delta'), 10);
                if (type && !isNaN(delta)) attachLongPress(btn, type, delta);
            });
            document.getElementById('resetTransformBtn').addEventListener('click', resetTransform);
        }

        function toggleSidebar(sidebar, show) {
            if (show === undefined) sidebar.classList.toggle('open');

            else sidebar.classList.remove('open');
        }
        transformBtn.addEventListener('click', () => {

        document.querySelectorAll('.close-sidebar-btn').forEach(btn => {

        function hasMandarinSource() {
            return playData.sources && playData.sources.some(src => src.remark && src.remark.toLowerCase().includes('国语'));
        }
        function updateBubbleVisibility() {
            if (bubbleHidden) { mandarinBubble.style.display = 'none'; return; }
            const hasMandarin = hasMandarinSource();
            const currentIsMandarin = playData.sources[currentSourceIndex] && playData.sources[currentSourceIndex].remark && playData.sources[currentSourceIndex].remark.toLowerCase().includes('国语');
            mandarinBubble.style.display = (hasMandarin && !currentIsMandarin) ? 'block' : 'none';

        function onSourceBtnClick() {

        sourceSelectBtn.removeEventListener('click', onSourceBtnClick);

        function renderSourceList() {
            const container = document.getElementById('sourceListContainer');
            if (!container) return;
            container.innerHTML = '';
            playData.sources.forEach((src, idx) => {
                const div = document.createElement('div');
                div.className = `source-item ${idx === currentSourceIndex ? 'active' : ''}`;
                const lineNumber = idx + 1;
                const displayText = `线路${lineNumber}`;
                div.innerHTML = `<span>${displayText}</span>`;
                let hasValidRemark = false, remarkText = '';
                if (src.remark !== undefined && src.remark !== null) {
                    const raw = src.remark.toString().trim();
                    if (raw !== '' && raw !== displayText && !raw.includes('线路')) {
                        hasValidRemark = true;
                        remarkText = raw;
                    }
                }
                if (hasValidRemark) {
                    const badge = document.createElement('div');
                    badge.className = 'source-remark-badge';
                    if (remarkText.length > 10) remarkText = remarkText.slice(0,8)+'…';

        async function loadEpisodes() {
            if (!isSeries || !playData.path) return;
            try {
                const res = await fetch(`LXJ/${playData.path}.json`);
                if (!res.ok) throw new Error();
                const json = await res.json();
                if (json?.data_v) {
                    episodesList = json.data_v;
                    if (playData.episodeName) {
                        const idx = episodesList.findIndex(ep => ep.name === playData.episodeName);
                        if (idx !== -1) {
                            currentEpisodeIndex = idx;
                            currentEpisodeDisplay = playData.episodeName;
                        }
                    }
                    renderEpisodeList();
                    if (episodesList.length > 0 && episodesList[currentEpisodeIndex]) {
                        const ep = episodesList[currentEpisodeIndex];
                        const sources = [];
                        for (let i = 1; i <= 10; i++) {
                            let key = i === 1 ? 'url' : `url${i}`;
                            if (ep[key]) {
                                let src = ep[key];
                                let remarkLine = '';
                                let match = src.match(/\(([^)]+)\)$/);
                                if (match) { remarkLine = match[1]; src = src.replace(/\([^)]+\)$/, '').trim(); }
                                sources.push({ url: src, remark: remarkLine || `线路${sources.length + 1}` });
                            }
                        }
                        playData.sources = sources;
                        let startSource = (() => {
                            let idx = (playData.startSourceIndex !== undefined && playData.startSourceIndex < sources.length) ? playData.startSourceIndex : -1;
                            if (idx === -1 && playerSettings.preferMandarin) {
                                const mandarinIdx = sources.findIndex(s => s.remark && s.remark.toLowerCase().includes('国语'));
                                if (mandarinIdx !== -1) idx = mandarinIdx;
                            }
                            if (idx === -1) idx = 0;
                            return idx;
                        })();
                        currentSourceIndex = startSource;
                        renderSourceList();
                        updateBubbleVisibility();
                        const targetUrl = sources[currentSourceIndex]?.url;
                        if (targetUrl) {
                            loadVideo(targetUrl);
                        } else if (ep.url) {
                            let url = ep.url;
                            let match = url.match(/\(([^)]+)\)$/);
                            if (match) url = url.replace(/\([^)]+\)$/, '').trim();
                            loadVideo(url);
                        }
                    }
                    nextEpisodeBtn.style.display = 'flex';
                    episodeSelectBtn.style.display = 'flex';
                    updateVideoTitleWithEpisode();
                } else {
                    nextEpisodeBtn.style.display = 'none';
                    episodeSelectBtn.style.display = 'none';
                }
            } catch(e) {
                console.warn('剧集数据加载失败', e);
                nextEpisodeBtn.style.display = 'none';
                episodeSelectBtn.style.display = 'none';
            }
        }

        function renderEpisodeList() {

                }

                    currentEpisodeIndex = idx;
                    playData.episodeName = ep.name;
                    playData.startTime = 0;

                    const sources = [];
                    for (let i = 1; i <= 10; i++) {
                        let key = i === 1 ? 'url' : `url${i}`;
                        if (ep[key]) {
                            let src = ep[key];
                            let remarkLine = '';
                            let match = src.match(/\(([^)]+)\)$/);
                            if (match) { remarkLine = match[1]; src = src.replace(/\([^)]+\)$/, '').trim(); }
                            sources.push({ url: src, remark: remarkLine || `线路${sources.length + 1}` });
                        }
                    }
                    playData.sources = sources;
                    let startSource = (() => {
                        let idx = 0;
                        if (playerSettings.preferMandarin) {
                            const mandarinIdx = sources.findIndex(s => s.remark && s.remark.toLowerCase().includes('国语'));
                            if (mandarinIdx !== -1) idx = mandarinIdx;
                        }
                        return idx;
                    })();
                    currentSourceIndex = startSource;
                    renderSourceList();
                    updateBubbleVisibility();
                    const targetUrl = sources[currentSourceIndex]?.url;
                    isEpisodeSwitch = true;
                    if (targetUrl) loadVideo(targetUrl);
                    else if (ep.url) {
                        let url = ep.url;
                        let match = url.match(/\(([^)]+)\)$/);
                        if (match) url = url.replace(/\([^)]+\)$/, '').trim();

        function updateVideoTitleWithEpisode() {

        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();

                showControls(true);
