                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
                if (controlsTimeout) clearTimeout(controlsTimeout);
                controls.classList.remove('hide');
            }
        });

        let isDragging = false;
        function getEventClientX(e) {
            if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
            if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientX;
            return e.clientX;
        }
        function handleProgressStart(e) {
            if (!video.duration || !isFinite(video.duration) || isNaN(video.duration)) return;
            isDragging = true; isSeeking = true;
            const rect = progressSlider.getBoundingClientRect();
            const clientX = getEventClientX(e);
            let percent = (clientX - rect.left) / rect.width;
            percent = Math.min(1, Math.max(0, percent));
            const seekTime = percent * video.duration;
            video.currentTime = seekTime;
            updateProgress();
            seekPopup.style.display = 'block';
            seekPopup.textContent = formatTime(seekTime);
            seekPopup.style.left = `${clientX}px`;
            seekPopup.style.top = `${rect.top - 40}px`;
            e.preventDefault();
        }
        function handleProgressMove(e) {
            if (!isDragging) return;
            const rect = progressSlider.getBoundingClientRect();
            const clientX = getEventClientX(e);
            let percent = (clientX - rect.left) / rect.width;
            percent = Math.min(1, Math.max(0, percent));
            const seekTime = percent * video.duration;
            video.currentTime = seekTime;
            seekPopup.textContent = formatTime(seekTime);
            seekPopup.style.left = `${clientX}px`;
            updateProgress();
            e.preventDefault();
        }
        function handleProgressEnd(e) {
            if (!isDragging) return;
            isDragging = false; isSeeking = false;
            const rect = progressSlider.getBoundingClientRect();
            const clientX = getEventClientX(e);
            let percent = (clientX - rect.left) / rect.width;
            percent = Math.min(1, Math.max(0, percent));
            video.currentTime = percent * video.duration;
            seekPopup.style.display = 'none';
            updateProgress();
            showControls(true);
            saveCurrentWatch();
        }
        progressSlider.addEventListener('mousedown', handleProgressStart);
        window.addEventListener('mousemove', handleProgressMove);
        window.addEventListener('mouseup', handleProgressEnd);
        progressSlider.addEventListener('touchstart', handleProgressStart, { passive: false });
        window.addEventListener('touchmove', handleProgressMove, { passive: false });
        window.addEventListener('touchend', handleProgressEnd);
        window.addEventListener('touchcancel', handleProgressEnd);

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return hrs > 0 ? `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` : `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        function updateBufferProgress() {
            if (!video.duration || !isFinite(video.duration) || video.duration <= 0) {
                bufferedBar.style.width = '0%';
                bufferText.textContent = '0 s';
                bufferDot.className = 'buffer-dot red';
                return;
            }
            if (!video.buffered || !video.buffered.length) {
                bufferedBar.style.width = '0%';
                bufferText.textContent = '0 s';
                bufferDot.className = 'buffer-dot red';
                return;
            }
            let maxBuffer = 0;
            for (let i = 0; i < video.buffered.length; i++) {
                const end = video.buffered.end(i);
                if (isFinite(end) && !isNaN(end)) maxBuffer = Math.max(maxBuffer, end);
            }
            const percent = Math.min(100, (maxBuffer / video.duration) * 100);
            bufferedBar.style.width = `${percent}%`;
            const remaining = Math.max(0, Math.floor(maxBuffer - video.currentTime));
            const isFullyBuffered = maxBuffer >= video.duration - 0.5;
            bufferDot.className = 'buffer-dot';
            if (isFullyBuffered) {
                bufferDot.classList.add('blue');
                bufferText.textContent = '已全部缓存';
            } else {
                if (remaining < 30) bufferDot.classList.add('red');
                else if (remaining < 60) bufferDot.classList.add('light-red');
                else if (remaining < 120) bufferDot.classList.add('yellow');
                else bufferDot.classList.add('green');
                bufferText.textContent = `${remaining} s`;
            }
        }
        function updateProgress() {
            if (!video.duration || !isFinite(video.duration)) return;
            const percent = (video.currentTime / video.duration) * 100;
            progressBar.style.width = `${Math.min(100, Math.max(0, percent))}%`;
            progressThumb.style.left = `${Math.min(100, Math.max(0, percent))}%`;
            currentTimeSpan.textContent = formatTime(video.currentTime);
            durationSpan.textContent = formatTime(video.duration);
            updateBufferProgress();
        }

        function showControls(force) {
            if (force !== true && isPlaying && !video.paused) {
                return;
            }
            controls.classList.remove('hide');
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (isPlaying && !isSeeking) controls.classList.add('hide');
            }, 3000);
        }
        function hideControls() {
            if (!isPlaying || isSeeking) return;
            controls.classList.add('hide');
            if (controlsTimeout) clearTimeout(controlsTimeout);
        }
        function toggleControls() {
            if (controls.classList.contains('hide')) showControls(true);
            else hideControls();
        }

        let touchStartTime = 0, touchStartX = 0, touchStartY = 0, touchMoved = false;
        const containerEl = document.querySelector('.player-container');
        function onTouchStart(e) {
            if (e.touches.length === 1) {
                touchStartTime = Date.now();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
            }
        }
        function onTouchMove(e) {
            if (e.touches.length === 1) {
                const dx = Math.abs(e.touches[0].clientX - touchStartX);
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                if (dx > 10 || dy > 10) touchMoved = true;
            }
        }
        function onTouchEnd(e) {
            if (!touchMoved && (Date.now() - touchStartTime) < 300 &&
                !window.__playerGesture.progressActive && window.__playerGesture.sliderActive === null) {
                if (!e.target.closest('.control-btn') && !e.target.closest('.sidebar-mask') && !e.target.closest('.close-sidebar-btn')) {
                    toggleControls();
                }
            }
        }
        containerEl.addEventListener('touchstart', onTouchStart, { passive: true });
        containerEl.addEventListener('touchmove', onTouchMove, { passive: false });
        containerEl.addEventListener('touchend', onTouchEnd);
        containerEl.addEventListener('click', (e) => {
            if (e.target.closest('.control-btn') || e.target.closest('.sidebar-mask') || e.target.closest('.close-sidebar-btn')) return;
            toggleControls();
        });

        episodeSelectBtn.addEventListener('click', () => { episodeSidebar.classList.add('open'); hideControls(); });
        episodeSidebar.addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('open'); showControls(true); } });
        sourceSidebar.addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('open'); showControls(true); } });
        nextEpisodeBtn.addEventListener('click', nextEpisode);

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key.toLowerCase()) {
                case ' ': e.preventDefault(); playPauseBtn.click(); break;
                case 'arrowright': e.preventDefault(); video.currentTime = Math.min(video.duration || 0, video.currentTime + 10); updateProgress(); showControls(true); break;
                case 'arrowleft': e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 10); updateProgress(); showControls(true); break;
                case 'f': e.preventDefault(); if (document.fullscreenElement) document.exitFullscreen(); else document.querySelector('.player-container').requestFullscreen(); break;
                case 'n': e.preventDefault(); if (isSeries) nextEpisode(); break;
            }
        });

        video.addEventListener('timeupdate', () => { if (!isDragging) updateProgress(); });
        video.addEventListener('progress', updateBufferProgress);
        video.addEventListener('loadedmetadata', () => {
            durationReady = true;
            durationSpan.textContent = formatTime(video.duration);
            updateProgress();
            updateBufferProgress();
            const key = getWatchRecordKey();
            const existing = localStorage.getItem(key);
            if (!isUserSwitching && existing && !playData.startTime && !isEpisodeSwitch) {
                try {
                    const rec = JSON.parse(existing);
                    if (rec.currentTime && rec.currentTime > 0 && rec.currentTime < video.duration) {
                        video.currentTime = Math.max(0, rec.currentTime - 8);
                    }
                    if (rec.transformValues) {
                        userValues = { ...userValues, ...rec.transformValues };
                        updateVideoTransform();
                    }
                    if (rec.sourceIndex !== undefined && rec.sourceIndex < playData.sources.length) {
                        currentSourceIndex = rec.sourceIndex;
                        renderSourceList();
                        updateBubbleVisibility();
                    }
                } catch(e) {}
            }
        });
        video.addEventListener('durationchange', () => {
            if (video.duration && isFinite(video.duration) && video.duration > 0) {
                durationReady = true;
                durationSpan.textContent = formatTime(video.duration);
                updateBufferProgress();
            }
        });
        video.addEventListener('seeked', updateBufferProgress);

        (function() {
            let horizontalActive = false;
            let startX = 0, startY = 0, startTime = 0, duration = 0;
            let hasMoved = false;
            let isActive = false; 
            const CENTER_AREA_RATIO = 1.0;
            const HORIZONTAL_THRESHOLD = 20;
            const VERTICAL_LIMIT = 0.6;
            const container = document.querySelector('.player-container');

            function showSeekPopup(seekTime) {
                if (!duration || isNaN(duration)) return;
                let totalStr = formatTime(duration);
                let currentStr = formatTime(seekTime);
                centerPopup.innerText = `${currentStr} / ${totalStr}`;
                centerPopup.style.display = 'block';
                clearTimeout(window.seekPopupTimer);
                window.seekPopupTimer = setTimeout(() => {
                    if (!horizontalActive) centerPopup.style.display = 'none';
                }, 800);
            }

            function shouldIgnore(e) {
                const ignoreSelectors = ['.control-btn', '.close-sidebar-btn', '.progress-slider', '.sidebar-mask', '.episode-btn', '.source-item'];
                for (let sel of ignoreSelectors) if (e.target.closest(sel)) return true;
                return false;
            }

            container.addEventListener('touchstart', (e) => {
                if (window.__playerGesture.sliderActive !== null) return;
                if (window.__playerGesture.progressActive) return;
                if (isActive) return;

                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX;
                const touchY = e.touches[0].clientY;
                const width = rect.width;
                const height = rect.height;
                const leftBound = width * (1 - CENTER_AREA_RATIO) / 2;
                const rightBound = width * (1 + CENTER_AREA_RATIO) / 2;
                const topBound = height * (1 - CENTER_AREA_RATIO) / 2;
                const bottomBound = height * (1 + CENTER_AREA_RATIO) / 2;
                if (touchX >= leftBound && touchX <= rightBound && touchY >= topBound && touchY <= bottomBound && !shouldIgnore(e)) {
                    startX = touchX;
                    startY = touchY;
                    startTime = video.currentTime;
                    duration = video.duration;
                    if (isNaN(duration) || duration === 0) { startX = null; return; }
                    horizontalActive = false;
                    hasMoved = false;
                    isActive = true;
                }
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                if (!isActive) return;
                const currentX = e.touches[0].clientX;
                const currentY = e.touches[0].clientY;
                const deltaX = currentX - startX;
                const deltaY = currentY - startY;
                if (window.__playerGesture.sliderActive !== null) {
                    isActive = false;
                    return;
                }
                if (!horizontalActive && Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > HORIZONTAL_THRESHOLD) {
                    horizontalActive = true;
                    window.__playerGesture.progressActive = true;
                    hasMoved = false;
                    e.preventDefault();
                    e.stopPropagation();
                    return;
                }
                if (horizontalActive) {
                    if (Math.abs(deltaY) > Math.abs(deltaX) * VERTICAL_LIMIT) {
                        horizontalActive = false;
                        window.__playerGesture.progressActive = false;
                        centerPopup.style.display = 'none';
                        isActive = false;
                        return;
                    }
                    if (!hasMoved && Math.abs(deltaX) < HORIZONTAL_THRESHOLD) return;
                    hasMoved = true;
                    e.preventDefault();
                    e.stopPropagation();
                    const rect = container.getBoundingClientRect();
                    const progress = deltaX / rect.width;
                    let newTime = startTime + progress * duration;
                    newTime = Math.min(duration, Math.max(0, newTime));
                    video.currentTime = newTime;
                    showSeekPopup(newTime);
                    updateProgress();
                }
            }, { passive: false });

            container.addEventListener('touchend', (e) => {
                if (isActive) {
                    if (horizontalActive && hasMoved) {
                        saveCurrentWatch();
                    }
                    horizontalActive = false;
                    window.__playerGesture.progressActive = false;
                    isActive = false;
                    startX = null;
                    setTimeout(() => {
                        if (!window.__playerGesture.sliderActive && !window.__playerGesture.progressActive) {
                            centerPopup.style.display = 'none';
                        }
                    }, 500);
                }
            });

            container.addEventListener('touchcancel', (e) => {
                if (isActive) {
                    horizontalActive = false;
                    window.__playerGesture.progressActive = false;
                    isActive = false;
                    startX = null;
                    centerPopup.style.display = 'none';
                }
            });

            container.addEventListener('mousedown', (e) => {
                if (window.__playerGesture.sliderActive !== null) return;
                if (window.__playerGesture.progressActive) return;
                if (isActive) return;
                const rect = container.getBoundingClientRect();
                const clientX = e.clientX;
                const clientY = e.clientY;
                const width = rect.width;
                const height = rect.height;
                const leftBound = width * (1 - CENTER_AREA_RATIO) / 2;
                const rightBound = width * (1 + CENTER_AREA_RATIO) / 2;
                const topBound = height * (1 - CENTER_AREA_RATIO) / 2;
                const bottomBound = height * (1 + CENTER_AREA_RATIO) / 2;
                if (clientX >= leftBound && clientX <= rightBound && clientY >= topBound && clientY <= bottomBound && !shouldIgnore(e)) {
                    startX = clientX;
                    startY = clientY;
                    startTime = video.currentTime;
                    duration = video.duration;
                    if (isNaN(duration) || duration === 0) { startX = null; return; }
                    horizontalActive = false;
                    hasMoved = false;
                    isActive = true;
                    e.preventDefault();
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isActive) return;
                if (window.__playerGesture.sliderActive !== null) {
                    isActive = false;
                    return;
                }
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;
                if (!horizontalActive && Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > HORIZONTAL_THRESHOLD) {
                    horizontalActive = true;
                    window.__playerGesture.progressActive = true;
                    hasMoved = false;
                    e.preventDefault();
                    return;
                }
                if (horizontalActive) {
                    if (Math.abs(deltaY) > Math.abs(deltaX) * VERTICAL_LIMIT) {
                        horizontalActive = false;
                        window.__playerGesture.progressActive = false;
                        centerPopup.style.display = 'none';
                        isActive = false;
                        return;
                    }
                    if (!hasMoved && Math.abs(deltaX) < HORIZONTAL_THRESHOLD) return;
                    hasMoved = true;
                    e.preventDefault();
                    const rect = container.getBoundingClientRect();
                    const progress = deltaX / rect.width;
                    let newTime = startTime + progress * duration;
                    newTime = Math.min(duration, Math.max(0, newTime));
                    video.currentTime = newTime;
                    showSeekPopup(newTime);
                    updateProgress();
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (isActive) {
                    if (horizontalActive && hasMoved) saveCurrentWatch();
                    horizontalActive = false;
                    window.__playerGesture.progressActive = false;
                    isActive = false;
                    startX = null;
                    setTimeout(() => {
                        if (!window.__playerGesture.sliderActive && !window.__playerGesture.progressActive) {
                            centerPopup.style.display = 'none';
                        }
                    }, 500);
                }
            });
        })();

        (function() {
            let isSliding = false;
            let startY = 0;
            let startVolume = 0;
            let startBrightness = 0;
            let activeType = null;
            let isActive = false;
            const VOLUME_AREA_RATIO = 0.50;
            const BRIGHTNESS_AREA_RATIO = 0.50;
            const MAX_VOLUME_CHANGE = 50;
            const MAX_BRIGHTNESS_CHANGE = 50;
            const MOVE_THRESHOLD = 30;
            const container = document.querySelector('.player-container');

            function setVolumeWrapper(percent) {
                let p = Math.min(100, Math.max(0, Math.round(percent)));
                setVolume(p);
                window.currentVolume = p;
                startVolume = p;
                showCenterPopup(`音量 ${Math.round(p)}%`);
            }

            function setBrightnessWrapper(percent) {
                let p = Math.min(100, Math.max(0, Math.round(percent)));
                setBrightness(p);
                window.currentBrightnessPercent = p;
                startBrightness = p;
                showCenterPopup(`亮度 ${Math.round(p)}%`);
            }

            function shouldIgnore(e) {
                const ignoreSelectors = ['.control-btn', '.close-sidebar-btn', '.progress-slider', '.sidebar-mask', '.episode-btn', '.source-item'];
                for (let sel of ignoreSelectors) if (e.target.closest(sel)) return true;
                return false;
            }

            container.addEventListener('touchstart', (e) => {
                if (window.__playerGesture.sliderActive !== null) return;
                if (window.__playerGesture.progressActive) return;
                if (isActive) return;

                const rect = container.getBoundingClientRect();
                const clientX = e.touches[0].clientX;
                const clientY = e.touches[0].clientY;
                const screenHeight = window.innerHeight;
                if (clientY < screenHeight * 0.1 || clientY > screenHeight * 0.9) return;
                if (shouldIgnore(e)) return;

                if (clientX > rect.right - rect.width * VOLUME_AREA_RATIO) {
                    activeType = 'volume';
                    startY = e.touches[0].clientY;
                    let vol = getSystemVolume();
                    if (vol < 0 || vol > 100) vol = 50;
                    startVolume = vol;
                    window.currentVolume = vol;
                    isSliding = false;
                    isActive = true;
                    e.preventDefault();
                } else if (clientX < rect.width * BRIGHTNESS_AREA_RATIO) {
                    activeType = 'brightness';
                    startY = e.touches[0].clientY;
                    var currentBright = window.currentBrightnessPercent;
                    if (currentBright === undefined || currentBright === null || isNaN(currentBright)) {
                        currentBright = getSystemBrightness();
                        if (currentBright === -1) currentBright = 50;
                        window.currentBrightnessPercent = currentBright;
                    }
                    startBrightness = currentBright;
                    isSliding = false;
                    isActive = true;
                    e.preventDefault();
                }
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                if (!isActive) return;
                if (window.__playerGesture.progressActive) {
                    isActive = false;
                    return;
                }
                const currentY = e.touches[0].clientY;
                const deltaY = startY - currentY;
                if (!isSliding && Math.abs(deltaY) > MOVE_THRESHOLD) {
                    isSliding = true;
                    window.__playerGesture.sliderActive = activeType;
                    if (activeType === 'volume') {
                        showCenterPopup(`音量 ${Math.round(startVolume)}%`);
                    } else {
                        showCenterPopup(`亮度 ${Math.round(startBrightness)}%`);
                    }
                    e.preventDefault();
                }
                if (isSliding) {
                    e.preventDefault();
                    const maxDelta = window.innerHeight;
                    let percentChange = (deltaY / maxDelta) * (activeType === 'volume' ? MAX_VOLUME_CHANGE : MAX_BRIGHTNESS_CHANGE);
                    percentChange = Math.min(activeType === 'volume' ? MAX_VOLUME_CHANGE : MAX_BRIGHTNESS_CHANGE,
                                            Math.max(-(activeType === 'volume' ? MAX_VOLUME_CHANGE : MAX_BRIGHTNESS_CHANGE), percentChange));
                    let newVal;
                    if (activeType === 'volume') {
                        newVal = startVolume + percentChange;
                        newVal = Math.min(100, Math.max(0, newVal));
                        if (newVal !== startVolume) {
                            setVolumeWrapper(newVal);
                            startVolume = newVal;
                            startY = currentY;
                        }
                    } else {
                        newVal = startBrightness + percentChange;
                        newVal = Math.min(100, Math.max(0, newVal));
                        if (newVal !== startBrightness) {
                            setBrightnessWrapper(newVal);
                            startBrightness = newVal;
                            startY = currentY;
                        }
                    }
                }
            }, { passive: false });

            container.addEventListener('touchend', (e) => {
                if (isActive) {
                    window.__playerGesture.sliderActive = null;
                    isSliding = false;
                    isActive = false;
                    activeType = null;
                    setTimeout(() => {
                        if (!window.__playerGesture.sliderActive && !window.__playerGesture.progressActive) {
                            centerPopup.style.display = 'none';
                        }
                    }, 500);
                }
            });

            container.addEventListener('touchcancel', (e) => {
                if (isActive) {
                    window.__playerGesture.sliderActive = null;
                    isSliding = false;
                    isActive = false;
                    activeType = null;
                    centerPopup.style.display = 'none';
                }
            });

            container.addEventListener('mousedown', (e) => {
                if (window.__playerGesture.sliderActive !== null) return;
                if (window.__playerGesture.progressActive) return;
                if (isActive) return;
                const rect = container.getBoundingClientRect();
                const clientX = e.clientX;
                const clientY = e.clientY;
                const screenHeight = window.innerHeight;
                if (clientY < screenHeight * 0.1 || clientY > screenHeight * 0.9) return;
                if (shouldIgnore(e)) return;
                if (clientX > rect.right - rect.width * VOLUME_AREA_RATIO) {
                    activeType = 'volume';
                    startY = e.clientY;
                    let vol = getSystemVolume();
                    if (vol < 0 || vol > 100) vol = 50;
                    startVolume = vol;
                    window.currentVolume = vol;
                    isSliding = false;
                    isActive = true;
                    e.preventDefault();
                } else if (clientX < rect.width * BRIGHTNESS_AREA_RATIO) {
                    activeType = 'brightness';
                    startY = e.clientY;
                    var currentBright = window.currentBrightnessPercent;
                    if (currentBright === undefined || currentBright === null || isNaN(currentBright)) {
                        currentBright = getSystemBrightness();
                        if (currentBright === -1) currentBright = 50;
                        window.currentBrightnessPercent = currentBright;
                    }
                    startBrightness = currentBright;
                    isSliding = false;
                    isActive = true;
                    e.preventDefault();
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isActive) return;
                if (window.__playerGesture.progressActive) {
                    isActive = false;
                    return;
                }
                const deltaY = startY - e.clientY;
                if (!isSliding && Math.abs(deltaY) > MOVE_THRESHOLD) {
                    isSliding = true;
                    window.__playerGesture.sliderActive = activeType;
                    if (activeType === 'volume') {
                        showCenterPopup(`音量 ${Math.round(startVolume)}%`);
                    } else {
                        showCenterPopup(`亮度 ${Math.round(startBrightness)}%`);
                    }
                    e.preventDefault();
                }
                if (isSliding) {
                    e.preventDefault();
                    const maxDelta = window.innerHeight;
                    let percentChange = (deltaY / maxDelta) * (activeType === 'volume' ? MAX_VOLUME_CHANGE : MAX_BRIGHTNESS_CHANGE);
                    percentChange = Math.min(activeType === 'volume' ? MAX_VOLUME_CHANGE : MAX_BRIGHTNESS_CHANGE,
                                            Math.max(-(activeType === 'volume' ? MAX_VOLUME_CHANGE : MAX_BRIGHTNESS_CHANGE), percentChange));
                    let newVal;
                    if (activeType === 'volume') {
                        newVal = startVolume + percentChange;
                        newVal = Math.min(100, Math.max(0, newVal));
                        if (newVal !== startVolume) {
                            setVolumeWrapper(newVal);
                            startVolume = newVal;
                            startY = e.clientY;
                        }
                    } else {
                        newVal = startBrightness + percentChange;
                        newVal = Math.min(100, Math.max(0, newVal));
                        if (newVal !== startBrightness) {
                            setBrightnessWrapper(newVal);
                            startBrightness = newVal;
                            startY = e.clientY;
                        }
                    }
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (isActive) {
                    window.__playerGesture.sliderActive = null;
                    isSliding = false;
                    isActive = false;
                    activeType = null;
                    setTimeout(() => {
                        if (!window.__playerGesture.sliderActive && !window.__playerGesture.progressActive) {
                            centerPopup.style.display = 'none';
                        }
                    }, 500);
                }
            });
        })();

        (function initBrightness() {
            var initialBright = getSystemBrightness();
            if (initialBright === -1) {
                initialBright = 50;
            }
            window.currentBrightnessPercent = initialBright;
        })();

        updateVideoTitleWithEpisode();
        bufferedBar.style.width = '0%';
        bufferText.textContent = '0 s';
        bufferDot.className = 'buffer-dot red';

        document.addEventListener('DOMContentLoaded', function() {
            toggleFullscreen();
        });

        if (playData.sources && playData.sources.length > 0) {
            let startSource = (() => {
                let idx = (playData.startSourceIndex !== undefined && playData.startSourceIndex < playData.sources.length) ? playData.startSourceIndex : -1;
                if (idx === -1 && playerSettings.preferMandarin) {
                    const mandarinIdx = playData.sources.findIndex(s => s.remark && s.remark.toLowerCase().includes('国语'));
                    if (mandarinIdx !== -1) idx = mandarinIdx;
                }
                if (idx === -1) idx = 0;
                return idx;
            })();
            currentSourceIndex = startSource;
            renderSourceList();
            updateBubbleVisibility();
            if (!isSeries) {
                loadVideo(playData.sources[startSource].url, playData.startTime || null);
            } else {
                loadEpisodes();
            }
        } else {
            alert('无可播放源');
            window.location.href = 'index.html';
        }

        video.addEventListener('play', () => { isPlaying = true; showControls(true); });
        video.addEventListener('pause', () => { isPlaying = false; showControls(); });

        setInterval(() => {
            if (isPlaying && durationReady) updateBufferProgress();
        }, 2000);

        updateBubbleVisibility();
        initTransformControls();
        updateVideoTransform();
    </script>
</body>
</html>
